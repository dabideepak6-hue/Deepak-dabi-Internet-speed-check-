<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deepak Dabi Speed Test</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    color: white;
    text-align: center;
    overflow-x: hidden;
    background: black;
}

/* 🌍 3D BACKGROUND */
#globe3d {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* UI */
.header {
    padding: 25px;
    font-size: 34px;
    font-weight: 700;
}

.sub {
    font-size: 14px;
    opacity: 0.7;
}

.card {
    background: rgba(255,255,255,0.08);
    margin: 20px auto;
    padding: 25px;
    border-radius: 20px;
    max-width: 900px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

img {
    transition: 0.4s;
}
img:hover {
    transform: scale(1.1);
    box-shadow: 0 0 30px #00e1ff;
}

.btn {
    margin-top: 15px;
    padding: 12px 22px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(45deg,#00c6ff,#00ffcc);
    color: black;
    font-weight: bold;
    cursor: pointer;
}
.btn:hover {
    transform: scale(1.05);
}

.footer {
    margin-top: 30px;
    font-size: 13px;
    opacity: 0.6;
}
</style>
</head>

<body>

<!-- 🌍 3D Globe -->
<div id="globe3d"></div>

<div class="header">🚀 Deepak Dabi Speed Test</div>
<div class="sub">Check your internet speed instantly ⚡</div>

<!-- PHOTO -->
<div style="margin-top:20px; position:relative; display:inline-block;">
    
    <img src="deepak.jpg" alt="Deepak Dabi"
    style="width:140px;height:140px;border-radius:50%;
    border:3px solid #00c6ff;
    box-shadow:0 0 20px #00c6ff;
    object-fit:cover;">

    <div style="
        position:absolute;
        bottom:5px;
        right:5px;
        background:#00ff00;
        color:black;
        font-size:10px;
        padding:4px 6px;
        border-radius:10px;
        font-weight:bold;
        box-shadow:0 0 10px #00ff00;
    ">
        ● LIVE
    </div>

</div>

<h2>Deepak Dabi</h2>
<p>📞 9521393991</p>

<!-- SPEED TEST -->
<div class="card">

    <h2>📶 Live Internet Speed Test</h2>

    <div style="position:relative;">
        <iframe id="testFrame" src="https://fast.com" width="100%" height="420"></iframe>

        <div style="
            position:absolute;
            bottom:10px;
            right:10px;
            background:rgba(0,0,0,0.5);
            padding:5px 10px;
            border-radius:10px;
            font-size:12px;
        ">
            Deepak Dabi ⚡
        </div>
    </div>

    <button class="btn" onclick="reloadTest()">🔄 Restart Test</button>
    <br>
    <button class="btn" onclick="shareWhatsApp()">📲 Share on WhatsApp</button>

</div>

<!-- TIPS -->
<div class="card">
    <h3>💡 Tips for Better Speed</h3>
    <p>✔ Keep router near you</p>
    <p>✔ Use 5GHz WiFi</p>
    <p>✔ Close background apps</p>
</div>

<div class="footer">
    © 2026 Deepak Dabi | Made for Viral Sharing 🔥
</div>

<script>
// Buttons
function reloadTest() {
    document.getElementById("testFrame").src = "https://fast.com";
}

function shareWhatsApp() {
    let text = "🔥 Check your internet speed now!\n🚀 Try here: " + window.location.href;
    window.open("https://wa.me/?text=" + encodeURIComponent(text));
}

// 🌍 THREE JS
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

let renderer = new THREE.WebGLRenderer({ alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('globe3d').appendChild(renderer.domElement);

// Globe
let geometry = new THREE.SphereGeometry(2, 64, 64);
let texture = new THREE.TextureLoader().load('https://threejs.org/examples/textures/earth_atmos_2048.jpg');
let material = new THREE.MeshBasicMaterial({ map: texture });
let globe = new THREE.Mesh(geometry, material);
scene.add(globe);

// Satellite
let satGeometry = new THREE.BoxGeometry(0.2,0.2,0.2);
let satMaterial = new THREE.MeshBasicMaterial({ color: 0x00ffff });
let satellite = new THREE.Mesh(satGeometry, satMaterial);
scene.add(satellite);

// Signal Ring
let ringGeometry = new THREE.RingGeometry(2.2,2.3,64);
let ringMaterial = new THREE.MeshBasicMaterial({ color: 0x00ffff, side: THREE.DoubleSide });
let ring = new THREE.Mesh(ringGeometry, ringMaterial);
ring.rotation.x = Math.PI/2;
scene.add(ring);

camera.position.z = 5;

// Mouse move
document.addEventListener('mousemove', (e) => {
    let x = (e.clientX/window.innerWidth - 0.5)*2;
    let y = (e.clientY/window.innerHeight - 0.5)*2;
    globe.rotation.y = x;
    globe.rotation.x = y;
});

// Animation
function animate() {
    requestAnimationFrame(animate);

    globe.rotation.y += 0.002;

    let t = Date.now()*0.001;
    satellite.position.x = Math.cos(t)*3;
    satellite.position.z = Math.sin(t)*3;

    ring.scale.x = 1 + Math.sin(t)*0.2;
    ring.scale.y = 1 + Math.sin(t)*0.2;

    renderer.render(scene, camera);
}
animate();

// Responsive
window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
});
</script>

</body>
</html>
