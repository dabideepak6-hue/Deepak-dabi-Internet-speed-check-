<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Full Auto YouTube System</title>

<style>
body{background:#020617;color:white;font-family:Arial;text-align:center;margin:0;}
.card{margin:10px;padding:15px;border-radius:15px;background:#111;box-shadow:0 0 15px #00f5ff;}
input,button,textarea{width:90%;padding:10px;margin:5px;border:none;border-radius:10px;}
button{background:#00f5ff;color:black;font-weight:bold;}
canvas{width:95%;border-radius:10px;}
</style>
</head>

<body>

<h2>🚀 Full Auto YouTube Creator</h2>

<div class="card">
<input id="topic" placeholder="Enter topic (Hanuman bhajan)">
<button onclick="generateAll()">✨ Generate All</button>
<button onclick="download()">⬇ Download Video</button>
</div>

<div class="card">
<textarea id="lyrics"></textarea>
<textarea id="seo"></textarea>
<canvas id="canvas" width="720" height="1280"></canvas>
</div>

<script>

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");
let recorder, chunks=[];

/* MAIN */
function generateAll(){

let topic=document.getElementById("topic").value||"Hanuman";

/* LYRICS */
let lyrics=`जय ${topic},
तेरी भक्ति सबसे न्यारी,
तेरा नाम ही सहारा,
जीवन में उजियारी।`;

document.getElementById("lyrics").value=lyrics;

/* SEO */
document.getElementById("seo").value=
`${topic} bhajan 🙏 | Powerful devotional song 🔥
#${topic} #Bhajan #AI`;

/* VIDEO */
startVideo(lyrics);

}

/* VIDEO */
async function startVideo(text){

let stream=canvas.captureStream(30);
recorder=new MediaRecorder(stream);
chunks=[];

recorder.ondataavailable=e=>chunks.push(e.data);
recorder.start();

/* VOICE */
let utter=new SpeechSynthesisUtterance(text);
utter.lang="hi-IN";
utter.rate=0.85;
speechSynthesis.speak(utter);

let lines=text.split("\n");

for(let line of lines){

await draw(line);
await new Promise(r=>setTimeout(r,3000));

}

recorder.stop();

}

/* DRAW SCENE */
async function draw(text){

let img=new Image();
img.crossOrigin="anonymous";
img.src="https://image.pollinations.ai/prompt/"+encodeURIComponent(text);

await new Promise(r=>img.onload=r);

ctx.drawImage(img,0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
ctx.font="40px Arial";
ctx.fillText(text,40,canvas.height-100);

}

/* DOWNLOAD */
function download(){

recorder.onstop=function(){
let blob=new Blob(chunks,{type:"video/webm"});
let url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="youtube_video.webm";
a.click();
};

}

</script>

</body>
</html>
