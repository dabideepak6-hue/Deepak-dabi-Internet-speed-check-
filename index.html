<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DD YouTube TV Dashboard</title>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#00c6ff;
margin:10px;
}

.container{
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:2fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:#111;
padding:12px;
border-radius:12px;
}

iframe{
width:100%;
height:400px;
border:none;
border-radius:12px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:10px;
background:#00c6ff;
color:black;
font-weight:bold;
cursor:pointer;
}

.big{
font-size:26px;
color:#00c6ff;
font-weight:bold;
}

.ticker{
background:#111;
padding:8px;
border-top:2px solid #00c6ff;
border-bottom:2px solid #00c6ff;
overflow:hidden;
}

.ticker span{
display:inline-block;
white-space:nowrap;
animation:scroll 10s linear infinite;
color:#00f5ff;
font-weight:bold;
}

@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

@media(max-width:900px){
.container{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<h1>📺 DD YOUTUBE TV DASHBOARD</h1>

<div class="ticker">
<span id="news">DD TV DASHBOARD ACTIVE • YOUTUBE CONNECTED • LIVE DATA READY • AUTO MODE ENABLED • SYSTEM RUNNING...</span>
</div>

<div class="container">

<!-- PLAYER -->
<div class="card">

<iframe id="player"
src=""
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>

<div>
<button onclick="loadLatest()">🔄 Latest Video</button>
<button onclick="autoMode()">🔁 AUTO MODE</button>
<button onclick="stop()">⛔ STOP</button>
</div>

</div>

<!-- SUBSCRIBER -->
<div class="card">

<h3>📊 LIVE SUBSCRIBERS</h3>

<div class="big" id="subs">Loading...</div>

<button onclick="getSubs()">Refresh</button>

</div>

<!-- AI PANEL -->
<div class="card">

<h3>🧠 GROWTH AI</h3>

<div class="big" id="ai">Ready</div>

<button onclick="ai()">Generate Tip</button>

</div>

</div>

<script>

/* 🔥 STEP 1: PUT YOUR DETAILS HERE */
const API_KEY = "AIzaSyClXgWiIAt4HKo78hMlQcmMZ1JCl0tY8pg";
const CHANNEL_ID = "UCz8pPrV3SmCKRUem0R1JvOw";

let videos=[];
let i=0;
let interval;

/* LOAD LATEST VIDEOS */
async function loadLatest(){

let url=`https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=id&order=date&maxResults=5`;

let res=await fetch(url);
let data=await res.json();

videos=data.items
.filter(v=>v.id.videoId)
.map(v=>v.id.videoId);

play(videos[0]);
}

/* PLAY VIDEO */
function play(id){
document.getElementById("player").src=
"https://www.youtube.com/embed/"+id+"?autoplay=1";
}

/* AUTO MODE */
function autoMode(){
stop();

interval=setInterval(()=>{
i++;
if(i>=videos.length) i=0;
play(videos[i]);
},5000);
}

/* STOP */
function stop(){
clearInterval(interval);
}

/* SUBSCRIBER COUNT */
async function getSubs(){

try{
let url=`https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${CHANNEL_ID}&key=${API_KEY}`;

let res=await fetch(url);
let data=await res.json();

let subs=data.items[0].statistics.subscriberCount;

document.getElementById("subs").innerText=
Number(subs).toLocaleString()+" Subscribers";

}catch(e){
document.getElementById("subs").innerText="API Error";
}

}

/* AI TIPS */
let tips=[
"Upload 2 Shorts Daily",
"Use Trending Topics",
"Make Series Content",
"Improve Thumbnails",
"Go Live Weekly"
];

function ai(){
let r=Math.floor(Math.random()*tips.length);
document.getElementById("ai").innerText=tips[r];
}

/* NEWS */
let news=[
"DD TV ACTIVE",
"YOUTUBE CONNECTED",
"LIVE SYSTEM RUNNING",
"AUTO MODE READY",
"AI ENGINE ONLINE"
];

let n=0;

setInterval(()=>{
document.getElementById("news").innerText=news[n];
n=(n+1)%news.length;
},4000);

/* INIT */
getSubs();
loadLatest();

</script>

</body>
</html>
