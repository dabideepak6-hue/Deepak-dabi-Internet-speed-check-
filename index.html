<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deepak AI Generator PRO</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.card{
margin:12px;
padding:15px;
border-radius:15px;
background:rgba(0,0,0,0.6);
box-shadow:0 0 20px #00f5ff;
}

input,button{
width:90%;
padding:12px;
margin:5px;
border:none;
border-radius:10px;
}

button{
background:linear-gradient(45deg,#00f5ff,#00ff9d);
font-weight:bold;
color:black;
}

img{
width:95%;
margin-top:10px;
border-radius:10px;
box-shadow:0 0 25px #00f5ff;
}
</style>
</head>

<body>

<h2>⚡ AI Image Generator PRO</h2>

<div class="card">
<input id="prompt" placeholder="Type: Hanuman ji">
<button onclick="improvePrompt()">✨ Auto Improve Prompt</button>
<button onclick="generate()">🚀 Generate Image</button>
</div>

<div class="card">
<p id="status"></p>
<img id="result">
</div>

<script>

/* 🔥 PROMPT IMPROVER */
function improvePrompt(){

let input = document.getElementById("prompt");
let p = input.value.toLowerCase();

if(!p){
alert("Enter prompt first");
return;
}

/* Smart Enhancer */
let improved = p;

/* Add style */
if(!p.includes("4k")) improved += ", 4K ultra HD";
if(!p.includes("detailed")) improved += ", highly detailed";
if(!p.includes("cinematic")) improved += ", cinematic lighting";
if(!p.includes("realistic")) improved += ", ultra realistic";
if(!p.includes("sharp")) improved += ", sharp focus";

/* Theme detection */
if(p.includes("hanuman")){
improved += ", divine aura, glowing orange light, hindu god, epic background";
}

if(p.includes("krishna")){
improved += ", golden aura, flute, peacock feather, divine lighting";
}

if(p.includes("lion")){
improved += ", fire aura, powerful, fantasy epic style";
}

if(p.includes("city")){
improved += ", cyberpunk neon lights, night scene, futuristic";
}

/* Final polish */
improved += ", masterpiece, trending on artstation, 8K wallpaper";

/* Update input */
input.value = improved;

}

/* 🔥 GENERATE IMAGE */
function generate(){

let prompt = document.getElementById("prompt").value;
let img = document.getElementById("result");
let status = document.getElementById("status");

if(!prompt){
alert("Enter prompt");
return;
}

status.innerText="⚡ Generating...";
img.src="";

/* FREE AI IMAGE */
let url = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt);
url += "?seed=" + Math.floor(Math.random()*100000);

img.src = url;

img.onload = ()=>{
status.innerText="✅ Image Ready";
}

img.onerror = ()=>{
status.innerText="❌ Try different prompt";
}

}

</script>

</body>
</html>
