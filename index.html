<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DD YouTube TV System</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:white;
text-align:center;
}

h1{
color:#00c6ff;
margin:15px;
}

.container{
max-width:900px;
margin:auto;
padding:10px;
}

.card{
background:#111;
padding:15px;
margin:10px;
border-radius:12px;
}

iframe{
width:100%;
height:360px;
border:none;
border-radius:12px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:10px;
background:#00c6ff;
color:black;
font-weight:bold;
cursor:pointer;
}

input{
padding:10px;
border-radius:8px;
border:none;
width:200px;
margin:5px;
}
</style>
</head>

<body>

<h1>📺 DD FULL YOUTUBE TV SYSTEM</h1>

<div class="container">

<!-- PLAYER -->
<div class="card">
<iframe id="player"
src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>
</div>

<!-- CONTROLS -->
<div class="card">
<h3>🎬 Video Controls</h3>

<button onclick="prevVideo()">⏮ Prev</button>
<button onclick="nextVideo()">⏭ Next</button>
<button onclick="autoPlay()">🔁 Auto Play</button>

</div>

<!-- CUSTOM INPUT -->
<div class="card">
<h3>🔎 Play Custom Video</h3>
<input id="videoId" placeholder="Enter YouTube Video ID">
<button onclick="playCustom()">Play</button>
</div>

<!-- YOUR CHANNEL PLAYLIST -->
<div class="card">
<h3>📡 Your Channel Videos (Auto Playlist)</h3>

<iframe
src="https://www.youtube.com/embed/videoseries?list=UUxxxxxxxxxxxx&autoplay=1&loop=1"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>

</div>

</div>

<script>

/* SAMPLE VIDEO LIST */
let videos=[
"dQw4w9WgXcQ",
"3JZ_D3ELwOQ",
"kJQP7kiw5Fk",
"tgbNymZ7vqY"
];

let index=0;

/* LOAD VIDEO */
function loadVideo(id){
document.getElementById("player").src=
"https://www.youtube.com/embed/"+id+"?autoplay=1";
}

/* NEXT */
function nextVideo(){
index++;
if(index>=videos.length) index=0;
loadVideo(videos[index]);
}

/* PREV */
function prevVideo(){
index--;
if(index<0) index=videos.length-1;
loadVideo(videos[index]);
}

/* AUTO PLAY */
let auto=false;
let interval;

function autoPlay(){

auto=!auto;

if(auto){
interval=setInterval(()=>{
nextVideo();
},5000);
}else{
clearInterval(interval);
}
}

/* CUSTOM VIDEO */
function playCustom(){
let id=document.getElementById("videoId").value;
if(id){
loadVideo(id);
}
}

</script>

</body>
</html>
