<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DD TV Automation System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:white;
text-align:center;
}

h1{
color:#00c6ff;
margin:10px;
}

/* TICKER */
.ticker{
background:#111;
padding:8px;
overflow:hidden;
border-top:2px solid #00c6ff;
border-bottom:2px solid #00c6ff;
}

.ticker span{
display:inline-block;
white-space:nowrap;
animation:scroll 10s linear infinite;
color:#00f5ff;
font-weight:bold;
}

@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* LAYOUT */
.container{
display:grid;
grid-template-columns:2fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:#111;
padding:10px;
border-radius:10px;
}

/* SPEED */
.circle{
width:180px;
height:180px;
border-radius:50%;
border:5px solid #00c6ff;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.speed{
font-size:26px;
color:#00c6ff;
font-weight:bold;
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#00c6ff;
color:black;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

input{
padding:10px;
border-radius:10px;
border:none;
margin:5px;
}

/* VIDEO */
iframe{
width:100%;
height:260px;
border:none;
border-radius:10px;
}

/* LIVE BOX */
.live{
background:#000;
padding:10px;
border-radius:10px;
margin-top:10px;
text-align:left;
max-height:150px;
overflow:auto;
}

/* MOBILE */
@media(max-width:900px){
.container{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<h1>📺 DD TV AUTOMATION SYSTEM</h1>

<!-- NEWS TICKER -->
<div class="ticker">
<span id="ticker">Breaking: DD TV Live System Active • Internet Speed Test Running • Channel Automation ON • Tech News Update...</span>
</div>

<div class="container">

<!-- LEFT -->
<div class="card">

<input id="name" placeholder="Enter Name">

<div class="circle">
<div class="speed" id="speed">0</div>
<div>Mbps</div>
</div>

<button onclick="startTest()">START TEST</button>

<div>
⬇ Download: <span id="down">0</span><br>
⬆ Upload: <span id="up">0</span><br>
📡 Ping: <span id="ping">0</span><br>
🏆 Score: <span id="score">0</span>
</div>

<canvas id="chart"></canvas>

</div>

<!-- RIGHT
