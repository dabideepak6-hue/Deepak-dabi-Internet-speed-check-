<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deepak Dabi Speed Test</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: white;
    text-align: center;
}

.header {
    padding: 25px;
    font-size: 34px;
    font-weight: 700;
}

.sub {
    font-size: 14px;
    opacity: 0.7;
}

.card {
    background: rgba(255,255,255,0.08);
    margin: 20px auto;
    padding: 25px;
    border-radius: 20px;
    max-width: 900px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

img {
    transition: 0.4s;
}
img:hover {
    transform: scale(1.1);
    box-shadow: 0 0 30px #00e1ff;
}

.btn {
    margin-top: 15px;
    padding: 12px 22px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(45deg,#00c6ff,#00ffcc);
    color: black;
    font-weight: bold;
    cursor: pointer;
}
.btn:hover {
    transform: scale(1.05);
}

.footer {
    margin-top: 30px;
    font-size: 13px;
    opacity: 0.6;
}
</style>

</head>
<body>

<div class="header">🚀 Deepak Dabi Speed Test</div>
<div class="sub">Check your internet speed instantly ⚡</div>

<!-- 🔥 PHOTO + LIVE -->
<div style="margin-top:20px; position:relative; display:inline-block;">
    
    <img src="deepak.jpg" alt="Deepak Dabi"
    style="width:140px;height:140px;border-radius:50%;
    border:3px solid #00c6ff;
    box-shadow:0 0 20px #00c6ff;
    object-fit:cover;">

    <!-- LIVE BADGE -->
    <div style="
        position:absolute;
        bottom:5px;
        right:5px;
        background:#00ff00;
        color:black;
        font-size:10px;
        padding:4px 6px;
        border-radius:10px;
        font-weight:bold;
        box-shadow:0 0 10px #00ff00;
    ">
        ● LIVE
    </div>

</div>

<h2>Deepak Dabi</h2>
<p>📞 9521393991</p>

<!-- SPEED TEST -->
<div class="card">

    <h2>📶 Live Internet Speed Test</h2>

    <div style="position:relative;">
        <iframe id="testFrame" src="https://fast.com" width="100%" height="420"></iframe>

        <!-- WATERMARK -->
        <div style="
            position:absolute;
            bottom:10px;
            right:10px;
            background:rgba(0,0,0,0.5);
            padding:5px 10px;
            border-radius:10px;
            font-size:12px;
        ">
            Deepak Dabi ⚡
        </div>
    </div>

    <button class="btn" onclick="reloadTest()">🔄 Restart Test</button>
    <br>
    <button class="btn" onclick="shareWhatsApp()">📲 Share on WhatsApp</button>

</div>

<!-- TIPS -->
<div class="card">
    <h3>💡 Tips for Better Speed</h3>
    <p>✔ Keep router near you</p>
    <p>✔ Use 5GHz WiFi</p>
    <p>✔ Close background apps</p>
</div>

<div class="footer">
    © 2026 Deepak Dabi | Made for Viral Sharing 🔥
</div>

<script>
function reloadTest() {
    document.getElementById("testFrame").src = "https://fast.com";
}

function shareWhatsApp() {
    let text = "🔥 Check your internet speed now!\n🚀 Try here: " + window.location.href + "\n📶 Powered by Deepak Dabi";
    let url = "https://wa.me/?text=" + encodeURIComponent(text);
    window.open(url, '_blank');
}
</script>

</body>
</html>
