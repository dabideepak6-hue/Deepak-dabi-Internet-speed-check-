<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deepak Dabi PRO CRM</title>

<style>
body{margin:0;background:#0b0f1a;color:white;font-family:Arial;text-align:center;}
.card{background:rgba(255,255,255,0.05);margin:10px;padding:15px;border-radius:15px;}
input,select{width:90%;padding:10px;margin:6px;border:none;border-radius:10px;}
button{width:92%;padding:10px;margin:5px;border:none;border-radius:10px;font-weight:bold;}
#list{text-align:left;font-size:13px;}
a{color:#00f5ff;}
</style>
</head>

<body>

<h2>🚀 Deepak Dabi PRO CRM</h2>

<div class="card">
<select id="prefix">
<option>Mr.</option>
<option>Mrs.</option>
<option>Ms.</option>
</select>

<input id="name" placeholder="Customer Name">
<input id="number" placeholder="Mobile Number">

<button onclick="sendBefore()">📦 Before Recovery</button>
<button onclick="sendDone()">✅ Recovery Done</button>
</div>

<div class="card">
<h3>📊 Dashboard</h3>
<p>Total: <span id="total">0</span></p>
<p>Pending: <span id="pending">0</span></p>
<p>Done: <span id="done">0</span></p>
</div>

<div class="card">
<h3>📋 Customers</h3>
<div id="list"></div>
</div>

<div class="card" id="locationBox" style="display:none;">
<h3>📍 Share Location</h3>
<button onclick="getLocation()">Share Location</button>
<p id="status"></p>
</div>

<script>

/* ====== CRM PART ====== */

function saveCustomer(name,number){
let data=JSON.parse(localStorage.getItem("crm")||"[]");
data.push({name,number,status:"Pending",date:new Date().toLocaleString()});
localStorage.setItem("crm",JSON.stringify(data));
updateDashboard();
loadList();
}

function sendBefore(){
let name=nameInput();
let number=numInput();
let prefix=document.getElementById("prefix").value;

if(!number) return;

saveCustomer(name,number);

/* UNIQUE LINK */
let link = location.href.split("#")[0] + "#track";

let msg=`Dear ${prefix} ${name} Ji,

Airtel AirFiber device collect karna hai.

📍 Location bheje:
${link}

- Deepak Dabi 9521393991`;

openWA(number,msg);
}

function sendDone(){
let name=nameInput();
let number=numInput();
let prefix=document.getElementById("prefix").value;

if(!number) return;

let data=JSON.parse(localStorage.getItem("crm")||"[]");
if(data.length>0) data[data.length-1].status="Done";
localStorage.setItem("crm",JSON.stringify(data));

updateDashboard();
loadList();

let msg=`Dear ${prefix} ${name} Ji,

✅ Device successfully collect ho gaya hai.

Dhanyavad 🙏
Deepak Dabi`;

openWA(number,msg);
}

function openWA(number,msg){
window.open("https://wa.me/91"+number+"?text="+encodeURIComponent(msg));
}

function nameInput(){
return document.getElementById("name").value||"Customer";
}

function numInput(){
let n=document.getElementById("number").value;
if(!/^[0-9]{10}$/.test(n)){alert("Invalid number");return null;}
return n;
}

function updateDashboard(){
let data=JSON.parse(localStorage.getItem("crm")||"[]");
document.getElementById("total").innerText=data.length;
document.getElementById("pending").innerText=data.filter(c=>c.status==="Pending").length;
document.getElementById("done").innerText=data.filter(c=>c.status==="Done").length;
}

function loadList(){
let data=JSON.parse(localStorage.getItem("crm")||"[]");
let html="";

data.forEach((c,i)=>{
html+=`
<div style="background:#111;padding:10px;margin:5px;border-radius:10px">
<b>${c.name}</b> (${c.number})<br>
${c.status}<br>
<button onclick="markDone(${i})">Done</button>
</div>`;
});

document.getElementById("list").innerHTML=html;
}

function markDone(i){
let data=JSON.parse(localStorage.getItem("crm"));
data[i].status="Done";
localStorage.setItem("crm",JSON.stringify(data));
updateDashboard();
loadList();
}

/* ====== LOCATION PART ====== */

if(location.hash === "#track"){
document.getElementById("locationBox").style.display="block";
}

function getLocation(){

if(!navigator.geolocation){
document.getElementById("status").innerText="❌ Not supported";
return;
}

document.getElementById("status").innerText="📡 Getting location...";

navigator.geolocation.getCurrentPosition(

function(pos){

let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

let map=`https://maps.google.com/?q=${lat},${lon}`;

document.getElementById("status").innerHTML=
"✅ Location received<br><br><a href='"+map+"' target='_blank'>Open Map</a>";

/* SAVE (optional) */
let loc=JSON.parse(localStorage.getItem("locations")||"[]");
loc.push({lat,lon,time:new Date().toLocaleString()});
localStorage.setItem("locations",JSON.stringify(loc));

},

function(){
document.getElementById("status").innerText="❌ Permission denied";
}

);

}

/* INIT */
updateDashboard();
loadList();

</script>

</body>
</html>
