<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deepak Dabi Speed Test</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

/* 🔝 TOP BAR */
.top-bar {
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:8px 15px;
    background:rgba(0,0,0,0.5);
    z-index:999;
}

.left-info {color:#00ffff;}
.right-info {color:#fff;}

.weather-icon {margin-left:5px;}

/* 🌍 GLOBE */
.globe {
    width:200px;
    height:200px;
    margin:70px auto 20px;
    border-radius:50%;
    overflow:hidden;
    position:relative;

    background:url('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg') repeat-x;
    background-size:cover;

    animation:rotate 20s linear infinite;

    box-shadow: inset -30px -20px 40px rgba(0,0,0,0.6),
                0 0 40px cyan;
}

@keyframes rotate {
    from{background-position:0 0;}
    to{background-position:1000px 0;}
}

/* ✍️ BIG NEON NAME */
.name {
    position:absolute;
    top:150px;
    left:50%;
    transform:translateX(-50%);
    
    font-size:36px;
    font-weight:900;
    letter-spacing:2px;

    color:#fff;
    padding:6px 14px;
    border-radius:12px;
    background:rgba(0,0,0,0.4);

    animation:neonGlow 3s linear infinite;
}

/* 🌈 7 COLOR NEON */
@keyframes neonGlow {
    0%{text-shadow:0 0 5px red,0 0 15px red;}
    14%{text-shadow:0 0 5px orange,0 0 15px orange;}
    28%{text-shadow:0 0 5px yellow,0 0 15px yellow;}
    42%{text-shadow:0 0 5px green,0 0 15px green;}
    57%{text-shadow:0 0 5px cyan,0 0 15px cyan;}
    71%{text-shadow:0 0 5px blue,0 0 15px blue;}
    85%{text-shadow:0 0 5px violet,0 0 15px violet;}
    100%{text-shadow:0 0 5px red,0 0 15px red;}
}

/* 📊 SPEED */
.speed-box {
    width:90%;
    max-width:600px;
    margin:20px auto;
}

iframe {
    width:100%;
    height:300px;
    border:none;
    border-radius:15px;
}

/* 📶 SIGNAL */
.signal {margin:20px;}
.bar {
    display:inline-block;
    width:8px;
    margin:2px;
    background:cyan;
    animation:signal 1s infinite;
}
.bar:nth-child(1){height:10px;}
.bar:nth-child(2){height:15px;}
.bar:nth-child(3){height:20px;}
.bar:nth-child(4){height:25px;}

@keyframes signal {
    0%{opacity:0.3;}
    50%{opacity:1;}
    100%{opacity:0.3;}
}

/* 📍 MAP */
.map-box {
    width:90%;
    max-width:600px;
    margin:20px auto;
}
.map-box iframe {
    height:250px;
}

/* FOOTER */
.footer {
    margin:20px;
    opacity:0.6;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <div class="left-info">
        🌡️ <span id="temp">Loading...</span>
        <span class="weather-icon" id="icon"></span>
    </div>
    <div class="right-info">
        🕒 <span id="time"></span>
    </div>
</div>

<h2 style="margin-top:60px;">🚀 Deepak Dabi Speed Test</h2>

<!-- 🌍 GLOBE -->
<div class="globe"></div>
<div class="name">Deepak Dabi</div>

<p>📞 9521393991</p>

<!-- SPEED -->
<div class="speed-box">
    <iframe src="https://fast.com"></iframe>
</div>

<!-- SIGNAL -->
<div class="signal">
📶 Network Signal<br>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<!-- MAP -->
<div class="map-box">
    <iframe id="map"></iframe>
</div>

<div class="footer">© 2026 Deepak Dabi</div>

<script>
// TIME
setInterval(()=>{
    document.getElementById("time").innerText = new Date().toLocaleString();
},1000);

// GPS + WEATHER + MAP
navigator.geolocation.getCurrentPosition(pos=>{
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
    .then(res=>res.json())
    .then(data=>{
        let t = data.current_weather.temperature;
        document.getElementById("temp").innerText = t+"°C";

        let code = data.current_weather.weathercode;
        let icon="☀️";
        if(code>2) icon="☁️";
        if(code>60) icon="🌧️";
        document.getElementById("icon").innerText=icon;
    });

    document.getElementById("map").src=
    `https://maps.google.com/maps?q=${lat},${lon}&z=15&output=embed`;
});
</script>

</body>
</html>
