<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deepak Dabi Speed Test</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: white;
    text-align: center;
}

/* LOGO */
.logo {
    width:120px;
    height:120px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    font-weight:bold;
    margin:20px auto;
    background: linear-gradient(45deg,#00c6ff,#0072ff,#ff00cc);
    color:white;
    animation: glow 2s infinite alternate, rotate 6s linear infinite;
}

/* Glow */
@keyframes glow {
    0% { box-shadow: 0 0 10px #00c6ff; }
    100% { box-shadow: 0 0 30px #ff00cc; }
}

/* Rotate */
@keyframes rotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* TEXT */
.name {
    font-size:28px;
    font-weight:600;
}
.title {
    color:#00c6ff;
}

/* CARD */
.card {
    margin:20px auto;
    padding:20px;
    max-width:900px;
    background:rgba(255,255,255,0.08);
    border-radius:20px;
    backdrop-filter: blur(10px);
    box-shadow:0 0 30px rgba(0,0,0,0.5);
}

/* BUTTON */
.btn {
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* FOOTER */
.footer {
    margin-top:30px;
    font-size:13px;
    opacity:0.7;
}
</style>

</head>
<body>

<div class="logo">DD</div>

<div class="name">🚀 Deepak Dabi</div>
<div class="title">Internet Speed Test</div>

<div class="card">
<h2>📶 Live Speed Test</h2>

<iframe src="https://fast.com" width="100%" height="420" style="border-radius:10px;"></iframe>

<button class="btn" onclick="location.reload()">🔄 Restart</button>
<br>
<button class="btn" onclick="share()">📲 Share</button>
</div>

<div class="card">
<h3>💡 Speed Tips</h3>
<p>✔ Router near रखो</p>
<p>✔ Background apps बंद करो</p>
<p>✔ 5GHz WiFi use करो</p>
</div>

<div class="footer">
© 2026 Deepak Dabi | Made for Viral 🔥
</div>

<script>
function share(){
let text = "🔥 Apni Internet Speed check karo 👇\\n" + window.location.href;
window.open("https://wa.me/?text=" + encodeURIComponent(text));
}

/* Auto WhatsApp Popup */
setTimeout(() => {
    let text = "🔥 Apni Internet Speed check karo 👇\\n" + window.location.href;
    window.open("https://wa.me/?text=" + encodeURIComponent(text));
}, 5000);
</script>

</body>
</html>
