<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DD Pro Dashboard</title>

<style>
body{margin:0;background:#020b14;color:white;font-family:Arial}
h1{text-align:center;color:#00f5ff}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:15px;
padding:15px;
box-shadow:0 0 20px rgba(0,255,255,0.2);
}

/* CLOCK */
.clock{
width:240px;height:240px;
border-radius:50%;
border:4px solid cyan;
margin:auto;
position:relative;
box-shadow:0 0 30px cyan;
}
.number{position:absolute;color:#00f5ff;transform:translate(-50%,-50%)}
.hand{position:absolute;top:50%;left:50%;transform-origin:50% 100%;transform:translate(-50%,-100%)}
.hour{width:6px;height:70px;background:white}
.minute{width:4px;height:90px;background:#00f5ff}
.second{width:2px;height:100px;background:red}
.center{width:10px;height:10px;background:#00f5ff;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}

.digital{text-align:center;color:#00f5ff;font-size:26px}
.sub{text-align:center}

/* WEATHER */
.temp{font-size:50px;color:orange}
.weather-icon{font-size:70px}
.row{display:flex;justify-content:space-around}

/* MESSAGE */
input,select{
width:90%;
padding:10px;
margin:5px;
border-radius:10px;
border:none;
}
button{
width:90%;
padding:12px;
background:linear-gradient(90deg,green,lightgreen);
border:none;
border-radius:10px;
font-weight:bold;
}
.preview{
background:#001f2f;
padding:10px;
border-radius:10px;
margin-top:10px;
font-size:13px;
white-space:pre-line;
}

/* MOBILE */
@media(max-width:800px){
.container{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<h1>DD PRO DASHBOARD</h1>

<div class="container">

<!-- CLOCK -->
<div class="card">
<div class="clock" id="clock"></div>
<div class="digital" id="time"></div>
<div class="sub" id="date"></div>
<div class="sub" id="day"></div>
</div>

<!-- WEATHER -->
<div class="card">
<div class="row">
<div class="temp" id="temp">--°C</div>
<div class="weather-icon" id="icon">⛅</div>
</div>
<div id="desc">Loading...</div>
<div class="row">
<div>💧 <span id="humidity"></span>%</div>
<div>🌬 <span id="wind"></span></div>
</div>
</div>

</div>

<!-- MESSAGE -->
<div class="card">

<input id="name" placeholder="Customer Name" oninput="detectAI()">
<input id="number" placeholder="Mobile Number">

<div id="ai">AI: Waiting...</div>

<select id="manual">
<option value="auto">Auto</option>
<option value="Mr.">Mr.</option>
<option value="Mrs.">Mrs.</option>
</select>

<button onclick="sendMsg()">📲 Send WhatsApp</button>

<div class="preview" id="preview"></div>

</div>

<script>

/* CLOCK */
const clock=document.getElementById("clock");
for(let i=1;i<=12;i++){
let a=(i*30-90)*Math.PI/180;
let x=50+40*Math.cos(a);
let y=50+40*Math.sin(a);
let n=document.createElement("div");
n.className="number";
n.style.left=x+"%";
n.style.top=y+"%";
n.innerText=i;
clock.appendChild(n);
}
clock.innerHTML+=`
<div class="hand hour" id="h"></div>
<div class="hand minute" id="m"></div>
<div class="hand second" id="s"></div>
<div class="center"></div>
`;

function updateClock(){
let d=new Date();
h.style.transform=`translate(-50%,-100%) rotate(${(d.getHours()%12)*30}deg)`;
m.style.transform=`translate(-50%,-100%) rotate(${d.getMinutes()*6}deg)`;
s.style.transform=`translate(-50%,-100%) rotate(${d.getSeconds()*6}deg)`;

time.innerText=d.toLocaleTimeString();
date.innerText=d.toLocaleDateString();
day.innerText=d.toLocaleDateString("en-IN",{weekday:'long'});
}
setInterval(updateClock,1000);

/* WEATHER */
async function getWeather(){
let res=await fetch("https://wttr.in/?format=j1");
let data=await res.json();
let c=data.current_condition[0];

temp.innerText=c.temp_C+"°C";
desc.innerText=c.weatherDesc[0].value;
humidity.innerText=c.humidity;
wind.innerText=c.windspeedKmph;

/* ICON */
let d=c.weatherDesc[0].value.toLowerCase();
if(d.includes("sun")) icon.innerText="☀️";
else if(d.includes("cloud")) icon.innerText="☁️";
else if(d.includes("rain")) icon.innerText="🌧️";
else icon.innerText="⛅";
}
getWeather();

/* AI */
let prefix="Mr.";

function detectAI(){
let name=document.getElementById("name").value.toLowerCase();
prefix = (name.endsWith("a")||name.endsWith("i"))?"Mrs.":"Mr.";
ai.innerText="AI: "+prefix;
updatePreview();
}

/* FULL MESSAGE */
function getMessage(name){
return `Dear ${prefix} ${name} Ji,

मैं Deepak Dabi, Airtel AirFiber Recovery Advisor बोल रहा हूँ।
आपका Airtel AirFiber Box (Router & Adapter) recovery हेतु collect करना है।

कृपया device ready रखें 🙏
Kindly share your current location for smooth coordination.

Device return न करने की स्थिति में Airtel द्वारा penalty charges लग सकते हैं।

धन्यवाद,
Deepak Dabi
📞 9521393991
Airtel AirFiber Recovery Advisor`;
}

/* PREVIEW */
function updatePreview(){
let name=document.getElementById("name").value;
preview.innerText=getMessage(name);
}

/* SEND */
function sendMsg(){
let name=document.getElementById("name").value;
let number=document.getElementById("number").value;

if(!number.startsWith("91")) number="91"+number;

let msg=getMessage(name);

window.location.href=
`https://api.whatsapp.com/send?phone=${number}&text=${encodeURIComponent(msg)}`;
}

</script>

</body>
</html>
