<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DD Message + Clock</title>

<style>
body{
margin:0;
background:#0b0f14;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

/* CARD */
.card{
background:#111;
padding:20px;
border-radius:15px;
max-width:400px;
margin:20px auto;
}

/* INPUT */
input{
padding:10px;
margin:10px;
width:90%;
border-radius:10px;
border:none;
font-size:16px;
}

/* BUTTON */
button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#00c6ff;
color:black;
font-weight:bold;
cursor:pointer;
}

/* CLOCK */
.clock{
width:200px;
height:200px;
border:6px solid #00c6ff;
border-radius:50%;
position:relative;
margin:20px auto;
}

.hand{
position:absolute;
width:50%;
height:2px;
background:white;
top:50%;
transform-origin:100%;
transform:rotate(90deg);
}

.hour{ height:4px; }
.minute{ height:3px; }
.second{ background:red; }

.center{
width:10px;
height:10px;
background:#00c6ff;
border-radius:50%;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<h2>📲 DD Auto Message + Clock</h2>

<!-- ANALOG CLOCK -->
<div class="clock">
<div class="hand hour" id="hour"></div>
<div class="hand minute" id="minute"></div>
<div class="hand second" id="second"></div>
<div class="center"></div>
</div>

<!-- MESSAGE SYSTEM -->
<div class="card">

<input type="text" id="name" placeholder="Customer Name">
<input type="text" id="number" placeholder="Mobile Number (91XXXXXXXXXX)">

<button onclick="sendMsg()">Send Message</button>

</div>

<script>

/* ⏰ CLOCK FUNCTION */
function updateClock(){

let now = new Date();

let sec = now.getSeconds();
let min = now.getMinutes();
let hr = now.getHours();

let secDeg = sec * 6;
let minDeg = min * 6 + sec * 0.1;
let hrDeg = hr * 30 + min * 0.5;

document.getElementById("second").style.transform = `rotate(${secDeg}deg)`;
document.getElementById("minute").style.transform = `rotate(${minDeg}deg)`;
document.getElementById("hour").style.transform = `rotate(${hrDeg}deg)`;

}

setInterval(updateClock,1000);

/* 📲 MESSAGE FUNCTION */
function sendMsg(){

let name = document.getElementById("name").value;
let number = document.getElementById("number").value;

let message = `Dear Mr. ${name} Ji,

मैं Deepak Dabi, Airtel AirFiber Recovery Advisor बोल रहा हूँ।
आपका Airtel AirFiber device (Router & Adapter) collect करना है।

कृपया device ready रखें 🙏
और अपनी current location share कर दें।

Device return न करने पर penalty charges लग सकते हैं।

धन्यवाद,
Deepak Dabi
9521393991`;

let url = "https://wa.me/" + number + "?text=" + encodeURIComponent(message);

window.open(url, "_blank");

}

</script>

</body>
</html>
