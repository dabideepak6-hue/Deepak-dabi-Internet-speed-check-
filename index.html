<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Recovery WhatsApp System</title>

<style>
body{
margin:0;
background:#0b0f1a;
color:white;
font-family:Arial;
text-align:center;
}

.card{
background:rgba(255,255,255,0.05);
padding:15px;
margin:15px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,255,255,0.2);
}

textarea,input,button{
width:90%;
padding:10px;
margin:5px;
border-radius:10px;
border:none;
}

button{
background:linear-gradient(90deg,green,lightgreen);
font-weight:bold;
cursor:pointer;
}

.preview{
background:#001f2f;
padding:10px;
border-radius:10px;
white-space:pre-line;
text-align:left;
font-size:13px;
}
</style>
</head>

<body>

<h2>🚀 AI RECOVERY WHATSAPP SYSTEM</h2>

<div class="card">

<textarea id="data" rows="6" placeholder="Enter:
Name,Number
Deepak,9999999999
Rameswari,8888888888"></textarea>

<button onclick="start()">📲 Start Sending</button>

<div class="preview" id="status">Status: Waiting...</div>

</div>

<script>

let index = 0;
let users = [];

/* AI PREFIX */
function getPrefix(name){
name = name.toLowerCase();
return (name.endsWith("a") || name.endsWith("i")) ? "Mrs." : "Mr.";
}

/* 🔥 SAME RECOVERY MESSAGE (UNCHANGED) */
function getMessage(name){

let prefix = getPrefix(name);

return `Dear ${prefix} ${name} Ji,

मैं Deepak Dabi, Airtel AirFiber Recovery Advisor बोल रहा हूँ।
आपका Airtel AirFiber Box (Router & Adapter) recovery हेतु collect करना है।

कृपया device ready रखें 🙏
Kindly share your current location for smooth coordination.

Device return न करने की स्थिति में Airtel द्वारा penalty charges लग सकते हैं।

धन्यवाद,
Deepak Dabi
📞 9521393991
Airtel AirFiber Recovery Advisor`;
}

function start(){

let raw = document.getElementById("data").value.trim();

if(!raw){
alert("Enter data");
return;
}

users = raw.split("\n").map(line=>{
let parts = line.split(",");
return {
name: parts[0].trim(),
number: parts[1].trim()
};
});

index = 0;
sendNext();
}

function sendNext(){

if(index >= users.length){
document.getElementById("status").innerText = "✅ Completed!";
return;
}

let user = users[index];

let number = user.number;
if(!number.startsWith("91")){
number = "91" + number;
}

let message = getMessage(user.name);

let url = "https://api.whatsapp.com/send?phone="
+ number
+ "&text="
+ encodeURIComponent(message);

document.getElementById("status").innerText =
`Sending ${index+1}/${users.length} → ${user.name}`;

window.open(url, "_blank");

index++;

setTimeout(sendNext, 4000);
}

</script>

</body>
</html>
