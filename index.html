<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DD Ultra All-in-One System</title>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Arial;
text-align:center;
}

/* CLOCK */
.clock{
width:240px;height:240px;
border-radius:50%;
margin:20px auto;
position:relative;
background:#111;
border:4px solid cyan;
}

.number{
position:absolute;
color:cyan;
transform:translate(-50%,-50%);
}

.hand{
position:absolute;
top:50%;left:50%;
transform-origin:50% 100%;
transform:translate(-50%,-100%);
}

.hour{width:5px;height:60px;background:white;}
.minute{width:3px;height:80px;background:cyan;}
.second{width:2px;height:90px;background:red;}

.center{
width:8px;height:8px;
background:cyan;
border-radius:50%;
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
}

.digital{color:cyan;}
.day{color:#00ffcc;font-weight:bold;}
.date{font-size:14px;}

/* CARD */
.card{
background:#111;
margin:15px;
padding:15px;
border-radius:10px;
}

/* INPUT */
input,select{
padding:10px;
margin:5px;
width:90%;
border:none;
border-radius:8px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
background:orange;
color:black;
font-weight:bold;
}

/* PLAYER */
iframe{
width:100%;
height:200px;
border:none;
}

/* VISUALIZER */
.visualizer{
display:flex;
justify-content:center;
gap:4px;
height:60px;
}

.bar{
width:5px;
background:lime;
animation:beat 1s infinite;
}

@keyframes beat{
0%,100%{height:10px;}
50%{height:50px;}
}
</style>
</head>

<body>

<h2>🚀 DD Ultra System</h2>

<!-- CLOCK -->
<div class="clock" id="clock"></div>
<div class="digital" id="digital"></div>
<div class="day" id="day"></div>
<div class="date" id="date"></div>

<!-- MESSAGE -->
<div class="card">
<input id="name" placeholder="Name" oninput="detectAI()">
<input id="number" placeholder="Mobile Number">

<div id="aiResult">AI: Waiting...</div>

<select id="manual">
<option value="auto">Auto</option>
<option value="Mr.">Mr.</option>
<option value="Mrs.">Mrs.</option>
</select>

<button onclick="sendMsg()">Send WhatsApp</button>
</div>

<!-- MUSIC -->
<div class="card">
<h3>🎧 Rajasthani DJ</h3>
<div id="songName"></div>

<iframe id="player"></iframe>

<button onclick="prev()">⏮</button>
<button onclick="next()">⏭</button>

<div class="visualizer">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>
</div>

<script>

/* CLOCK */
const clock=document.getElementById("clock");
for(let i=1;i<=12;i++){
let a=(i*30-90)*Math.PI/180;
let x=50+40*Math.cos(a);
let y=50+40*Math.sin(a);
let n=document.createElement("div");
n.className="number";
n.style.left=x+"%";
n.style.top=y+"%";
n.innerText=i;
clock.appendChild(n);
}
clock.innerHTML+=`
<div class="hand hour" id="h"></div>
<div class="hand minute" id="m"></div>
<div class="hand second" id="s"></div>
<div class="center"></div>
`;

function updateClock(){
let d=new Date();
let sec=d.getSeconds();
let min=d.getMinutes();
let hr=d.getHours();

h.style.transform=`translate(-50%,-100%) rotate(${hr*30+min*0.5}deg)`;
m.style.transform=`translate(-50%,-100%) rotate(${min*6}deg)`;
s.style.transform=`translate(-50%,-100%) rotate(${sec*6}deg)`;

digital.innerText=d.toLocaleTimeString("en-IN");
day.innerText=d.toLocaleDateString("en-IN",{weekday:'long'});
date.innerText=d.toLocaleDateString("hi-IN");
}
setInterval(updateClock,1000);

/* AI */
let female=["pooja","neha","priya","anjali","komal"];
let male=["deepak","rahul","amit","rohit"];

let prefix="Mr.";

function detectAI(){
let n=name.value.toLowerCase();
if(female.some(f=>n.includes(f))) prefix="Mrs.";
else if(male.some(m=>n.includes(m))) prefix="Mr.";
else prefix=n.endsWith("a")?"Mrs.":"Mr.";

aiResult.innerText="AI: "+prefix;
}

/* MESSAGE */
function sendMsg(){
let num=number.value;
if(!num.startsWith("91")) num="91"+num;

let p=manual.value==="auto"?prefix:manual.value;

let msg=`Dear ${p} ${name.value} Ji,

मैं Deepak Dabi, Airtel AirFiber Recovery Advisor हूँ।
आपका device collect करना है।

धन्यवाद
📞 9521393991`;

window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`);
}

/* MUSIC */
let songs=[
{ id:"1sYd7H9hQn0", name:"Le Photo Le" },
{ id:"9x9XG7z5r7U", name:"DJ Remix" },
{ id:"3JZ_D3ELwOQ", name:"Party Anthem" }
];

let i=0;

function play(){
player.src="https://www.youtube.com/embed/"+songs[i].id+"?autoplay=1";
songName.innerText=songs[i].name;
}

function next(){i=(i+1)%songs.length;play();}
function prev(){i=(i-1+songs.length)%songs.length;play();}

setInterval(next,30000);

play();

</script>

</body>
</html>
