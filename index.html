<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deepak CRM Tracking</title>

<style>
body{font-family:Arial;background:#020617;color:white;margin:0;}
.header{padding:15px;text-align:center;background:#111;}
.card{margin:10px;padding:15px;background:#111;border-radius:12px;}

input,select,button{
width:100%;padding:10px;margin:5px;border-radius:8px;border:none;
}

button{background:#00f5ff;color:black;font-weight:bold;}

.item{
background:#020617;padding:10px;margin:5px;border-radius:10px;
display:flex;justify-content:space-between;align-items:center;
}

.status{font-size:12px;padding:4px 8px;border-radius:6px;}

.pending{background:orange;}
.sent{background:blue;}
.delivered{background:purple;}
.done{background:green;}
</style>
</head>

<body>

<div class="header">📊 CRM Delivery Tracking</div>

<div class="card">

<select id="template">
<option value="recovery">Recovery</option>
<option value="workshop">Workshop</option>
</select>

<input id="number" placeholder="Mobile Number" oninput="autoFill(); autoSave()">
<input id="name" placeholder="Customer Name" oninput="autoSave()">

<button onclick="send()">Send WhatsApp</button>

</div>

<div class="card">
<input id="search" placeholder="Search..." oninput="load()">
<div id="list"></div>
</div>

<script>

let number=document.getElementById("number");
let nameField=document.getElementById("name");

/* SAVE */
function autoSave(){
if(number.value.length===10 && nameField.value){

let data=JSON.parse(localStorage.getItem("crm")||"{}");

data[number.value]={
name:nameField.value,
status:"pending"
};

localStorage.setItem("crm",JSON.stringify(data));
load();
}
}

/* FILL */
function autoFill(){
let data=JSON.parse(localStorage.getItem("crm")||"{}");

if(data[number.value]){
nameField.value=data[number.value].name;
}
}

/* SEND */
function send(){

let num=number.value;
let name=nameField.value;

let data=JSON.parse(localStorage.getItem("crm")||"{}");

if(!data[num]) return;

data[num].status="sent";

localStorage.setItem("crm",JSON.stringify(data));

let msg="Hello "+name;

window.open("https://api.whatsapp.com/send?phone=91"+num+"&text="+msg);

load();
}

/* STATUS CHANGE */
function changeStatus(num){

let data=JSON.parse(localStorage.getItem("crm")||"{}");

let current=data[num].status;

if(current==="pending") data[num].status="sent";
else if(current==="sent") data[num].status="delivered";
else if(current==="delivered") data[num].status="done";
else data[num].status="pending";

localStorage.setItem("crm",JSON.stringify(data));
load();
}

/* LOAD */
function load(){

let data=JSON.parse(localStorage.getItem("crm")||"{}");
let search=document.getElementById("search").value.toLowerCase();
let html="";

for(let num in data){

if(data[num].name.toLowerCase().includes(search) || num.includes(search)){

let s=data[num].status;

html+=`
<div class="item">
<div>
<b>${data[num].name}</b><br>${num}
<br><span class="status ${s}">${s}</span>
</div>

<div>
<button onclick="sendTo('${num}')">Send</button>
<button onclick="changeStatus('${num}')">Status</button>
</div>

</div>`;
}
}

list.innerHTML=html;
}

/* QUICK SEND */
function sendTo(num){
number.value=num;
autoFill();
send();
}

load();

</script>

</body>
</html>
