<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DD Ultra Speed Test</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Poppins;
background: radial-gradient(circle at top,#0f2027,#090a0f);
color:white;
text-align:center;
}

/* HEADER */
.logo{font-size:42px;color:#00f5ff;margin-top:20px;font-weight:700;}
.title{opacity:0.7;margin-bottom:20px}

/* CARD */
.card{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(18px);
margin:15px;
padding:20px;
border-radius:20px;
box-shadow:0 0 25px rgba(0,255,255,0.15);
}

/* SPEED CIRCLE */
.circle{
width:260px;height:260px;
margin:auto;
border-radius:50%;
border:8px solid rgba(255,255,255,0.08);
position:relative;
}

.glow{
position:absolute;
width:100%;height:100%;
border-radius:50%;
border-top:8px solid #00f5ff;
animation:spin 1.5s linear infinite;
}

@keyframes spin{100%{transform:rotate(360deg)}}

.center{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
}

.speed{
font-size:28px;font-weight:700;color:#00f5ff;
}

.small{
font-size:12px;opacity:0.7;
}

/* BUTTON */
button{
padding:12px 25px;
border:none;
border-radius:30px;
background:#00f5ff;
color:#000;
font-weight:600;
cursor:pointer;
margin-top:15px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:15px;
}

.box{
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:12px;
}

canvas{margin-top:15px;}

@media(max-width:700px){
.grid{grid-template-columns:1fr;}
.circle{width:200px;height:200px;}
}
</style>
</head>

<body>

<div class="logo">DD</div>
<div class="title">Ultra Speed Test Dashboard</div>

<div class="card">

<div class="circle">
<div class="glow"></div>
<div class="center">
<div class="speed" id="speed">0</div>
<div class="small">Mbps</div>
</div>
</div>

<button onclick="startTest()">Start Test</button>

<div class="grid">
<div class="box">Download <h3 id="down">0</h3></div>
<div class="box">Upload <h3 id="up">0</h3></div>
<div class="box">Ping <h3 id="ping">0</h3></div>
</div>

<canvas id="chart"></canvas>

</div>

<script>

let chart;
function initChart(){
const ctx=document.getElementById('chart');
chart=new Chart(ctx,{
type:'line',
data:{
labels:[],
datasets:[{
label:'Speed Mbps',
data:[],
borderColor:'#00f5ff',
tension:0.4
}]
},
options:{responsive:true}
});
}
initChart();

function updateChart(val){
if(chart.data.labels.length>20){
chart.data.labels.shift();
chart.data.datasets[0].data.shift();
}
chart.data.labels.push('');
chart.data.datasets[0].data.push(val);
chart.update();
}

function startTest(){

let speed=0;
let down=0;
let up=0;
let ping=Math.floor(Math.random()*50)+10;

document.getElementById("ping").innerText=ping+" ms";

let i=setInterval(()=>{

speed += Math.random()*12;
down += Math.random()*8;
up += Math.random()*5;

if(speed>120) clearInterval(i);

document.getElementById("speed").innerText=speed.toFixed(1);
document.getElementById("down").innerText=down.toFixed(1)+" Mbps";
document.getElementById("up").innerText=up.toFixed(1)+" Mbps";

updateChart(speed);

},200);

}

</script>

</body>
</html>
