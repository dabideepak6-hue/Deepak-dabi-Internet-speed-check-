<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DD AI Smart Message System</title>

<style>
body{
margin:0;
background:#0b0f14;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

h2{color:#00c6ff;}

.card{
background:#111;
padding:20px;
border-radius:15px;
max-width:350px;
margin:20px auto;
box-shadow:0 0 15px #00c6ff;
}

input,select{
padding:12px;
margin:10px;
width:90%;
border-radius:10px;
border:none;
font-size:16px;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:#00c6ff;
cursor:pointer;
font-weight:bold;
font-size:16px;
}

.result{
color:#00c6ff;
font-size:18px;
margin-top:10px;
}
</style>
</head>

<body>

<h2>🤖 DD AI Smart Message System</h2>

<div class="card">

<input id="name" placeholder="Enter Customer Name" oninput="detectAI()">
<input id="number" placeholder="Mobile Number (9876543210)">

<div class="result" id="aiResult">AI: Waiting...</div>

<select id="manual">
<option value="auto">Auto Detect</option>
<option value="Mr.">Force Mr.</option>
<option value="Mrs.">Force Mrs.</option>
</select>

<button onclick="sendMsg()">Send Message</button>

</div>

<script>

/* 🔥 DATA LIST */
let femaleList = [
"pooja","sunita","neha","rekha","kavita","anita","priya",
"meena","suman","rani","komal","shreya","payal","anjali",
"deepika","radha","seema","ritu","nisha"
];

let maleList = [
"ramesh","jitendra","deepak","mukesh","rajesh","suresh",
"mahesh","rohit","amit","vikas","rahul","manoj",
"ajay","sanjay","arjun","karan"
];

let detectedPrefix = "Mr.";
let confidence = 50;

/* 🤖 AI DETECT FUNCTION */
function detectAI(){

let name = document.getElementById("name").value.toLowerCase().trim();

if(!name){
document.getElementById("aiResult").innerText="AI: Waiting...";
return;
}

/* STEP 1: DIRECT MATCH */
if(femaleList.some(n => name.includes(n))){
detectedPrefix="Mrs.";
confidence=95;
}
else if(maleList.some(n => name.includes(n))){
detectedPrefix="Mr.";
confidence=95;
}
else{

/* STEP 2: ENDING LOGIC */
if(name.endsWith("a") || name.endsWith("i") || name.endsWith("y")){
detectedPrefix="Mrs.";
confidence=75;
}
else{
detectedPrefix="Mr.";
confidence=70;
}

}

/* SHOW RESULT */
document.getElementById("aiResult").innerText =
`AI: ${detectedPrefix} (${confidence}% sure)`;

}

/* 📩 SEND MESSAGE */
function sendMsg(){

let name = document.getElementById("name").value.trim();
let number = document.getElementById("number").value.trim();
let manual = document.getElementById("manual").value;

/* NUMBER FIX */
if(!number.startsWith("91")){
number="91"+number;
}

/* FINAL PREFIX */
let prefix = manual === "auto" ? detectedPrefix : manual;

/* FULL MESSAGE */
let message =
`Dear ${prefix} ${name} Ji,

मैं Deepak Dabi, Airtel AirFiber Recovery Advisor बोल रहा हूँ।
आपका Airtel AirFiber Box (Router & Adapter) recovery हेतु collect करना है।

कृपया device ready रखें 🙏
Kindly share your current location for smooth coordination.

Device return न करने की स्थिति में Airtel द्वारा penalty charges लग सकते हैं।

धन्यवाद,
Deepak Dabi
📞 9521393991
Airtel AirFiber Recovery Advisor`;

/* OPEN WHATSAPP */
let url = "https://wa.me/" + number + "?text=" + encodeURIComponent(message);
window.open(url, "_blank");

}

</script>

</body>
</html>
