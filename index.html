<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DD Final Working System</title>

<style>
body{margin:0;background:#000;color:white;font-family:Arial;text-align:center}

/* CLOCK */
.clock{
width:220px;height:220px;
border-radius:50%;
margin:20px auto;
border:3px solid cyan;
position:relative;
}
.number{
position:absolute;
color:cyan;
transform:translate(-50%,-50%);
}
.hand{
position:absolute;
top:50%;left:50%;
transform-origin:50% 100%;
transform:translate(-50%,-100%);
}
.hour{width:5px;height:60px;background:white;}
.minute{width:3px;height:80px;background:cyan;}
.second{width:2px;height:90px;background:red;}
.center{
width:8px;height:8px;
background:cyan;
border-radius:50%;
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
}

/* TEXT */
.digital{color:cyan;}
.day{color:#00ffcc;font-weight:bold;}
.date{font-size:14px;}

/* CARD */
.card{
background:#111;
margin:15px;
padding:15px;
border-radius:10px;
}

/* INPUT */
input,select{
padding:10px;
margin:5px;
width:90%;
border:none;
border-radius:8px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
background:orange;
color:black;
font-weight:bold;
cursor:pointer;
}

/* PLAYER */
iframe{
width:100%;
height:200px;
border:none;
}
</style>
</head>

<body>

<h2>🚀 DD Final System</h2>

<!-- CLOCK -->
<div class="clock" id="clock"></div>
<div class="digital" id="digital"></div>
<div class="day" id="day"></div>
<div class="date" id="date"></div>

<!-- MESSAGE -->
<div class="card">
<input id="name" placeholder="Enter Name">
<input id="number" placeholder="Mobile Number">

<div id="aiResult">AI: Waiting...</div>

<select id="manual">
<option value="auto">Auto</option>
<option value="Mr.">Mr.</option>
<option value="Mrs.">Mrs.</option>
</select>

<button onclick="sendMsg()">Send WhatsApp</button>
</div>

<!-- YOUTUBE -->
<div class="card">
<h3>🎧 DJ Player</h3>

<iframe id="player"
src="https://www.youtube.com/embed/1sYd7H9hQn0"
allowfullscreen>
</iframe>

<br>
<button onclick="playVideo()">▶ Play</button>
<button onclick="nextVideo()">⏭ Next</button>

</div>

<script>

/* CLOCK */
const clock=document.getElementById("clock");

for(let i=1;i<=12;i++){
let a=(i*30-90)*Math.PI/180;
let x=50+40*Math.cos(a);
let y=50+40*Math.sin(a);

let n=document.createElement("div");
n.className="number";
n.style.left=x+"%";
n.style.top=y+"%";
n.innerText=i;

clock.appendChild(n);
}

clock.innerHTML+=`
<div class="hand hour" id="h"></div>
<div class="hand minute" id="m"></div>
<div class="hand second" id="s"></div>
<div class="center"></div>
`;

function updateClock(){
let d=new Date();

document.getElementById("h").style.transform=
`translate(-50%,-100%) rotate(${(d.getHours()%12)*30}deg)`;

document.getElementById("m").style.transform=
`translate(-50%,-100%) rotate(${d.getMinutes()*6}deg)`;

document.getElementById("s").style.transform=
`translate(-50%,-100%) rotate(${d.getSeconds()*6}deg)`;

document.getElementById("digital").innerText=
d.toLocaleTimeString();

document.getElementById("day").innerText=
d.toLocaleDateString("en-IN",{weekday:'long'});

document.getElementById("date").innerText=
d.toLocaleDateString("hi-IN");
}
setInterval(updateClock,1000);

/* AI DETECT */
let detectedPrefix="Mr.";

document.getElementById("name").addEventListener("input",function(){
let name=this.value.toLowerCase();

if(!name){
aiResult.innerText="AI: Waiting...";
return;
}

if(name.endsWith("a") || name.endsWith("i")){
detectedPrefix="Mrs.";
}else{
detectedPrefix="Mr.";
}

aiResult.innerText="AI: "+detectedPrefix;
});

/* MESSAGE (SPLIT FIX) */
function sendMsg(){

let name=document.getElementById("name").value.trim();
let number=document.getElementById("number").value.trim();
let manual=document.getElementById("manual").value;

if(!number.startsWith("91")) number="91"+number;

let prefix = manual==="auto"?detectedPrefix:manual;

/* PART 1 */
let msg1=`Dear ${prefix} ${name} Ji,

मैं Deepak Dabi, Airtel AirFiber Recovery Advisor बोल रहा हूँ।
आपका Airtel AirFiber Box (Router & Adapter) recovery हेतु collect करना है।`;

/* PART 2 */
let msg2=`कृपया device ready रखें 🙏
Kindly share your current location for smooth coordination.

Device return न करने की स्थिति में penalty charges लग सकते हैं।

धन्यवाद,
Deepak Dabi
📞 9521393991`;

/* SEND */
window.open(`https://wa.me/${number}?text=${encodeURIComponent(msg1)}`);

setTimeout(()=>{
window.open(`https://wa.me/${number}?text=${encodeURIComponent(msg2)}`);
},2000);

}

/* YOUTUBE */
let videos=[
"1sYd7H9hQn0",
"9x9XG7z5r7U",
"3JZ_D3ELwOQ"
];

let index=0;

function playVideo(){
document.getElementById("player").src=
"https://www.youtube.com/embed/"+videos[index]+"?autoplay=1";
}

function nextVideo(){
index=(index+1)%videos.length;
playVideo();
}

</script>

</body>
</html>
