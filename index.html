<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deepak Dabi Fiber - Jodhpur</title>

<!-- MAP -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    color:white;
    text-align:center;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

/* TOP BAR */
.top-bar{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:8px;
    background:rgba(0,0,0,0.5);
    font-size:14px;
}

/* EARTH */
.globe{
    width:180px;
    height:180px;
    margin:60px auto 10px;
    border-radius:50%;
    background:url('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg') repeat-x;
    background-size:cover;
    animation:rotate 20s linear infinite;
}
@keyframes rotate{
    from{background-position:0;}
    to{background-position:1000px;}
}

/* ANALOG CLOCK */
.clock{
    width:180px;
    height:180px;
    border:5px solid white;
    border-radius:50%;
    margin:20px auto;
    position:relative;
    box-shadow:0 0 15px cyan;
}

/* CENTER */
.clock::after{
    content:'';
    width:10px;
    height:10px;
    background:white;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    border-radius:50%;
}

/* NUMBERS */
.number{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    font-size:14px;
    font-weight:bold;
    transform:rotate(calc(30deg * var(--i)));
}

.number span{
    transform:rotate(calc(-30deg * var(--i)));
}

/* HANDS */
.hour, .minute, .second{
    position:absolute;
    bottom:50%;
    left:50%;
    transform-origin:bottom;
    transform:translateX(-50%);
}

.hour{
    width:5px;
    height:45px;
    background:white;
}

.minute{
    width:3px;
    height:60px;
    background:cyan;
}

.second{
    width:2px;
    height:70px;
    background:red;
}

/* BOX */
.box{
    background:rgba(255,255,255,0.1);
    padding:15px;
    margin:15px auto;
    width:90%;
    max-width:400px;
    border-radius:15px;
}

/* INPUT */
input{
    width:90%;
    padding:10px;
    border:none;
    border-radius:8px;
}

/* BUTTON */
button{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    margin-top:10px;
    cursor:pointer;
    background:#00c6ff;
    color:white;
}

/* MAP */
#map{
    height:300px;
    width:90%;
    margin:20px auto;
    border-radius:15px;
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
🌡️ <span id="temp">Loading...</span>
🕒 <span id="time"></span>
</div>

<h2 style="margin-top:60px;">🚀 Jodhpur Fast WiFi</h2>

<!-- EARTH -->
<div class="globe"></div>

<!-- CLOCK -->
<div class="clock">

<div class="number" style="--i:1"><span>1</span></div>
<div class="number" style="--i:2"><span>2</span></div>
<div class="number" style="--i:3"><span>3</span></div>
<div class="number" style="--i:4"><span>4</span></div>
<div class="number" style="--i:5"><span>5</span></div>
<div class="number" style="--i:6"><span>6</span></div>
<div class="number" style="--i:7"><span>7</span></div>
<div class="number" style="--i:8"><span>8</span></div>
<div class="number" style="--i:9"><span>9</span></div>
<div class="number" style="--i:10"><span>10</span></div>
<div class="number" style="--i:11"><span>11</span></div>
<div class="number" style="--i:12"><span>12</span></div>

<div class="hour"></div>
<div class="minute"></div>
<div class="second"></div>

</div>

<!-- SPEED -->
<div class="box">
<iframe src="https://fast.com" style="width:100%; height:200px; border:none;"></iframe>
</div>

<!-- FORM -->
<div class="box">
<input id="name" placeholder="Name"><br><br>
<input id="mobile" placeholder="Mobile"><br><br>
<input id="city" placeholder="City"><br><br>

<button onclick="getLocation()">📍 Location</button>
<button onclick="submitLead()">Submit</button>
</div>

<div id="map"></div>

<!-- WHATSAPP -->
<a href="https://wa.me/919521393991"
style="position:fixed;bottom:20px;right:20px;
background:#25D366;color:white;padding:15px;
border-radius:50%;">💬</a>

<script>

// TIME + DATE
setInterval(()=>{
let now=new Date();

let time=now.toLocaleTimeString('en-IN',{
hour:'2-digit',minute:'2-digit',second:'2-digit'
});
let date=now.toLocaleDateString('en-IN');

document.getElementById("time").innerText=time+" | "+date;
},1000);

// WEATHER
navigator.geolocation.getCurrentPosition(pos=>{
fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true`)
.then(res=>res.json())
.then(data=>{
document.getElementById("temp").innerText=
`🌡️ ${data.current_weather.temperature}°C`;
});
});

// CLOCK
setInterval(()=>{
let now=new Date();

let sec=now.getSeconds();
let min=now.getMinutes();
let hr=now.getHours();

document.querySelector(".second").style.transform=
`translateX(-50%) rotate(${sec*6}deg)`;

document.querySelector(".minute").style.transform=
`translateX(-50%) rotate(${min*6}deg)`;

document.querySelector(".hour").style.transform=
`translateX(-50%) rotate(${hr*30+min/2}deg)`;

},1000);

// MAP
let map;
function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

if(map){map.remove();}
map=L.map('map').setView([lat,lon],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
L.marker([lat,lon]).addTo(map);
});
}

// SUBMIT
function submitLead(){
alert("Lead Sent!");
}

</script>

</body>
</html>
