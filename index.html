<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deepak Dabi Speed Test</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

/* TOP BAR */
.top-bar {
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:8px 15px;
    background:rgba(0,0,0,0.5);
}
.left-info {color:#00ffff;}
.right-info {color:#fff;}

/* GLOBE */
.globe {
    width:200px;
    height:200px;
    margin:70px auto 20px;
    border-radius:50%;
    background:url('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg') repeat-x;
    background-size:cover;
    animation:rotate 20s linear infinite;
}
@keyframes rotate {
    from{background-position:0;}
    to{background-position:1000px;}
}

/* NEON NAME */
.mobile-neon {
    font-size:34px;
    font-weight:900;
    margin-top:10px;
    animation:neon 3s linear infinite;
}
@keyframes neon {
    0%{text-shadow:0 0 10px red;}
    25%{text-shadow:0 0 10px yellow;}
    50%{text-shadow:0 0 10px cyan;}
    75%{text-shadow:0 0 10px blue;}
    100%{text-shadow:0 0 10px red;}
}

/* SPEED */
.speed-box {
    width:90%;
    max-width:600px;
    margin:20px auto;
}
iframe {
    width:100%;
    height:300px;
    border:none;
    border-radius:15px;
}

/* LEAD FORM */
.lead-box {
    background:rgba(255,255,255,0.1);
    padding:20px;
    margin:20px auto;
    width:90%;
    max-width:400px;
    border-radius:15px;
}
.lead-box input {
    width:90%;
    padding:10px;
    border:none;
    border-radius:8px;
}

/* BUTTON */
button {
    padding:10px 20px;
    border:none;
    border-radius:20px;
    margin-top:10px;
    cursor:pointer;
}

/* WhatsApp Button */
.wa-btn {
    background:#25D366;
    color:white;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <div class="left-info">
        🌡️ <span id="temp">Loading...</span>
    </div>
    <div class="right-info">
        🕒 <span id="time"></span>
    </div>
</div>

<h2 style="margin-top:60px;">🚀 Deepak Dabi Speed Test</h2>

<!-- GLOBE -->
<div class="globe"></div>

<!-- NAME -->
<div class="mobile-neon">Deepak Dabi</div>

<!-- SPEED -->
<div class="speed-box">
    <iframe src="https://fast.com"></iframe>
</div>

<!-- LEAD FORM -->
<div class="lead-box">
<h3>⚡ Jodhpur में Slow Internet? Get New Connection</h3>

<input type="text" id="name" placeholder="Your Name"><br><br>
<input type="tel" id="mobile" placeholder="Mobile Number"><br><br>
<input type="text" id="city" placeholder="Your City"><br><br>

<button onclick="submitLead()">Submit</button><br>

<a href="https://wa.me/919521393991?text=Hi%20I%20need%20new%20WiFi%20connection" target="_blank">
<button class="wa-btn">💬 WhatsApp Me</button>
</a>
</div>

<script>

// TIME
setInterval(()=>{
    document.getElementById("time").innerText = new Date().toLocaleString();
},1000);

// WEATHER
navigator.geolocation.getCurrentPosition(pos=>{
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
    .then(res=>res.json())
    .then(data=>{
        document.getElementById("temp").innerText =
        data.current_weather.temperature + "°C";
    });
});

// SUBMIT LEAD
function submitLead(){

let name = document.getElementById("name").value;
let mobile = document.getElementById("mobile").value;
let city = document.getElementById("city").value;

if(name=="" || mobile==""){
    alert("Fill details");
    return;
}

// 🔥 IMPORTANT: YAHAN APNA SCRIPT URL DAALO
fetch("YOUR_SCRIPT_URL_HERE", {
    method:"POST",
    body: JSON.stringify({
        name:name,
        mobile:mobile,
        city:city
    })
});

// WHATSAPP AUTO
let msg = `New Lead:%0AName: ${name}%0AMobile: ${mobile}%0ACity: ${city}`;
window.open(`https://wa.me/919521393991?text=${msg}`);

alert("Submitted Successfully!");
}
</script>

</body>
</html>
