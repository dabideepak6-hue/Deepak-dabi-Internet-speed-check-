<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deepak Recovery CRM</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.card{
margin:10px;
padding:15px;
border-radius:15px;
background:#111;
box-shadow:0 0 15px #00f5ff;
}

input,select,button{
width:90%;
padding:12px;
margin:5px;
border:none;
border-radius:10px;
}

button{
background:linear-gradient(45deg,#00f5ff,#00ff9d);
font-weight:bold;
color:black;
}

#list{
text-align:left;
font-size:13px;
}
</style>
</head>

<body>

<h2>📲 Deepak Recovery CRM</h2>

<div class="card">

<select id="prefix">
<option>Mr.</option>
<option>Mrs.</option>
<option>Ms.</option>
</select>

<input id="number" placeholder="Mobile Number" oninput="autoFill()">
<input id="name" placeholder="Customer Name">

<button onclick="save()">💾 Save</button>
<button onclick="send()">📩 Send WhatsApp</button>

</div>

<div class="card">
<h3>📊 Dashboard</h3>
<p>Total: <span id="total">0</span></p>
</div>

<div class="card">
<h3>📋 Customers</h3>
<div id="list"></div>
</div>

<script>

/* SAVE CUSTOMER */
function save(){

let num=document.getElementById("number").value;
let name=document.getElementById("name").value;

if(!num || !name){
alert("Enter details");
return;
}

let data=JSON.parse(localStorage.getItem("crm")||"{}");

data[num]=name;

localStorage.setItem("crm",JSON.stringify(data));

update();
load();

alert("Saved ✅");
}

/* AUTO FILL */
function autoFill(){

let num=document.getElementById("number").value;
let data=JSON.parse(localStorage.getItem("crm")||"{}");

if(data[num]){
document.getElementById("name").value=data[num];
}

}

/* SEND WHATSAPP */
function send(){

let num=document.getElementById("number").value;
let name=document.getElementById("name").value || "Customer";
let prefix=document.getElementById("prefix").value;

if(!/^[0-9]{10}$/.test(num)){
alert("Invalid number");
return;
}

let msg=`Dear ${prefix} ${name} Ji,

मैं Deepak Dabi, Airtel AirFiber Recovery Advisor बोल रहा हूँ।
आपका Airtel AirFiber Box (Router & Adapter) recovery हेतु collect करना है।

कृपया device ready रखें 🙏
Kindly share your current location for smooth coordination.

Device return न करने की स्थिति में Airtel द्वारा penalty charges लग सकते हैं।

धन्यवाद,
Deepak Dabi
📞 9521393991
Airtel AirFiber Recovery Advisor`;

let url="https://wa.me/91"+num+"?text="+encodeURIComponent(msg);

window.open(url);

}

/* LOAD LIST */
function load(){

let data=JSON.parse(localStorage.getItem("crm")||"{}");
let html="";

for(let num in data){

html+=`
<div style="background:#222;padding:10px;margin:5px;border-radius:10px">
<b>${data[num]}</b> (${num})
<button onclick="quickSend('${num}')">Send</button>
</div>`;
}

document.getElementById("list").innerHTML=html;

}

/* QUICK SEND */
function quickSend(num){

document.getElementById("number").value=num;
autoFill();
send();

}

/* DASHBOARD */
function update(){

let data=JSON.parse(localStorage.getItem("crm")||"{}");
document.getElementById("total").innerText=Object.keys(data).length;

}

/* INIT */
update();
load();

</script>

</body>
</html>
