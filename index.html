<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Bhajan Creator</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.card{
margin:12px;
padding:15px;
border-radius:15px;
background:rgba(0,0,0,0.6);
box-shadow:0 0 20px #00f5ff;
}

input,select,button,textarea{
width:90%;
padding:12px;
margin:5px;
border:none;
border-radius:10px;
}

button{
background:linear-gradient(45deg,#00f5ff,#00ff9d);
font-weight:bold;
color:black;
}

textarea{
height:120px;
}

audio{
width:90%;
margin-top:10px;
}
</style>
</head>

<body>

<h2>🙏 AI Bhajan Creator</h2>

<div class="card">
<input id="topic" placeholder="Bhajan topic (Hanuman, Krishna, Shiv)">
<select id="style">
<option>Bhajan</option>
<option>Aarti</option>
<option>Chalisa Style</option>
</select>

<button onclick="generate()">✨ Generate Bhajan</button>
</div>

<div class="card">
<textarea id="lyrics" placeholder="Lyrics will appear..."></textarea>

<button onclick="play()">🎤 Play Voice</button>
<button onclick="stop()">⏹ Stop</button>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_7c8f8cdb42.mp3">
</audio>

</div>

<div class="card">
<h3>📢 YouTube Pack</h3>
<textarea id="title"></textarea>
<textarea id="desc"></textarea>
<textarea id="tags"></textarea>

<button onclick="copy('title')">Copy Title</button>
<button onclick="copy('desc')">Copy Description</button>
<button onclick="copy('tags')">Copy Tags</button>
</div>

<script>

let synth = window.speechSynthesis;
let utter;

/* GENERATE */
function generate(){

let topic=document.getElementById("topic").value || "Hanuman";
let style=document.getElementById("style").value;

/* LYRICS */
let text=`(${style})

जय ${topic} देव, कृपा करो,
भक्तों के दुख हर लो,
तेरी महिमा अपार प्रभु,
हर दिल में उजियारा भर दो।

(Chorus)
जय ${topic} जय ${topic},
तेरा नाम ही सहारा,
तेरे चरणों में जीवन सारा।

भक्ति की ज्योति जलाओ प्रभु,
मन में शांति लाओ,
तेरे नाम का जप करते,
हर संकट दूर भगाओ।`;

document.getElementById("lyrics").value=text;

/* TITLE */
document.getElementById("title").value=
`${topic} Ji Powerful ${style} 🙏 | Dil Se Suno 🔥`;

/* DESC */
document.getElementById("desc").value=
`🙏 ${topic} Bhajan 🙏

Is bhajan ko dil se suniye aur kripa paiye.
Like, Share & Subscribe

#${topic} #Bhajan #Devotional #AIbhajan`;

/* TAGS */
document.getElementById("tags").value=
`${topic} bhajan, ${topic} song, devotional song, ai bhajan, hindu bhajan`;

}

/* PLAY VOICE */
function play(){

let text=document.getElementById("lyrics").value;

if(!text){
alert("Generate bhajan first");
return;
}

/* MUSIC */
document.getElementById("music").play();

/* VOICE */
utter = new SpeechSynthesisUtterance(text);
utter.lang="hi-IN";
utter.rate=0.85;
utter.pitch=1.1;

synth.speak(utter);

}

/* STOP */
function stop(){
synth.cancel();
document.getElementById("music").pause();
}

/* COPY */
function copy(id){
let t=document.getElementById(id);
t.select();
document.execCommand("copy");
alert("Copied!");
}

</script>

</body>
</html>
