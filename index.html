<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deepak Dabi Fiber - Jodhpur</title>

<!-- MAP -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

/* THEME */
body{
    margin:0;
    font-family:Arial;
    color:white;
    text-align:center;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

/* TOP BAR */
.top-bar{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:8px;
    background:rgba(0,0,0,0.5);
}

/* EARTH */
.globe{
    width:180px;
    height:180px;
    margin:60px auto 20px;
    border-radius:50%;
    background:url('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg') repeat-x;
    background-size:cover;
    animation:rotate 20s linear infinite;
}
@keyframes rotate{
    from{background-position:0;}
    to{background-position:1000px;}
}

/* BOX */
.box{
    background:rgba(255,255,255,0.1);
    padding:15px;
    margin:15px auto;
    width:90%;
    max-width:400px;
    border-radius:15px;
}

/* INPUT */
input{
    width:90%;
    padding:10px;
    border:none;
    border-radius:8px;
}

/* BUTTON */
button{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    margin-top:10px;
    cursor:pointer;
    background:#00c6ff;
    color:white;
}

/* MAP */
#map{
    height:300px;
    width:90%;
    margin:20px auto;
    border-radius:15px;
}

/* CHAT */
#aiChat{
    position:fixed;
    bottom:20px;
    right:20px;
    width:280px;
    background:#111;
    border-radius:10px;
    padding:10px;
}

#messages{
    height:200px;
    overflow:auto;
    text-align:left;
}

</style>
</head>

<body>

<div class="top-bar">
🌡️ <span id="temp">Loading...</span>
🕒 <span id="time"></span>
</div>

<h2 style="margin-top:60px;">🚀 Jodhpur Fast WiFi</h2>

<!-- 🌍 EARTH -->
<div class="globe"></div>

<!-- SPEED -->
<div class="box">
<iframe src="https://fast.com" style="width:100%; height:200px; border:none;"></iframe>
</div>

<!-- PLAN -->
<div class="box">
<h3>🔥 Airtel Fiber ₹499 Plan</h3>
<p>⚡ 40 Mbps Speed</p>
<p>📶 Unlimited Data</p>
<button onclick="orderNow()">Book Now</button>
</div>

<!-- FORM -->
<div class="box">
<input id="name" placeholder="Name"><br><br>
<input id="mobile" placeholder="Mobile (+91 or 10 digit)"><br><br>
<input id="city" placeholder="City"><br><br>

<button onclick="getLocation()">📍 Use My Location</button>
<p id="locationText"></p>

<button onclick="submitLead()">Submit</button>
</div>

<div id="feasibilityBox"></div>

<!-- MAP -->
<div id="map"></div>

<!-- 🤖 AI CHAT -->
<div id="aiChat">
<div id="messages"></div>
<input id="userInput" placeholder="Ask about WiFi...">
<button onclick="sendAI()">Send</button>
</div>

<script>

// TIME
setInterval(()=>{
document.getElementById("time").innerText=new Date().toLocaleTimeString();
},1000);

// WEATHER
navigator.geolocation.getCurrentPosition(pos=>{
fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true`)
.then(res=>res.json())
.then(data=>{
document.getElementById("temp").innerText=data.current_weather.temperature+"°C";
});
});

// MAP
let map;
function loadMap(lat,lon){
if(map){map.remove();}
map=L.map('map').setView([lat,lon],15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
L.marker([lat,lon]).addTo(map).bindPopup("📍 Your Location").openPopup();
}

// LOCATION
function getLocation(){
navigator.geolocation.getCurrentPosition(async pos=>{
let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

loadMap(lat,lon);

let res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
let data=await res.json();

let city=data.address.city||data.address.town||data.address.village||"";

document.getElementById("city").value=city;
document.getElementById("locationText").innerText="📍 "+city;

checkFeasibility(city);
});
}

// FEASIBILITY
function checkFeasibility(city){
let cities=["Jodhpur","Jaipur","Udaipur","Kota","Ajmer","Bikaner"];
let box=document.getElementById("feasibilityBox");

if(cities.includes(city)){
box.innerHTML="✅ Airtel Fiber Available in "+city;
box.style.color="lightgreen";
}else{
box.innerHTML="⚠️ Checking availability...";
box.style.color="orange";
}
}

// MOBILE FIX
function formatMobile(m){
m=m.replace(/\D/g,'');
if(m.startsWith("91") && m.length===12){
m=m.substring(2);
}
return m;
}

// SUBMIT
function submitLead(){

let name=document.getElementById("name").value;
let mobile=formatMobile(document.getElementById("mobile").value);
let city=document.getElementById("city").value;

if(!name || !mobile){
alert("Fill details");
return;
}

if(!/^[6-9]\d{9}$/.test(mobile)){
alert("Invalid mobile");
return;
}

navigator.geolocation.getCurrentPosition(pos=>{
let msg=`New Lead:%0AName:${name}%0AMobile:${mobile}%0ACity:${city}%0ALocation:https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
window.open(`https://wa.me/919521393991?text=${msg}`);
});

alert("Submitted!");
}

// ORDER
function orderNow(){
window.open("https://wa.me/919521393991?text=Hi I want Airtel Fiber");
}

// 🤖 AI CHAT
async function sendAI(){

let input=document.getElementById("userInput").value;
let box=document.getElementById("messages");

box.innerHTML += "<p>👤 "+input+"</p>";

let res=await fetch("http://localhost:3000/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:input})
});

let data=await res.json();

box.innerHTML += "<p>🤖 "+data.reply+"</p>";

document.getElementById("userInput").value="";
}

</script>

</body>
</html>
