<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deepak Dabi Speed Test</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: white;
    text-align: center;
}

/* 🔝 TOP BAR */
.top-bar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    padding: 8px 15px;
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(5px);
    z-index: 999;
}

.left-info {
    color: #00ffff;
}

.right-info {
    color: #ffffff;
}

/* 🌍 GLOBE */
.globe {
    width: 220px;
    height: 220px;
    margin: 70px auto 20px; /* top space for bar */
    border-radius: 50%;
    overflow: hidden;
    position: relative;

    background: url('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg') repeat-x;
    background-size: cover;

    animation: globeRotate 20s linear infinite;

    box-shadow: 
        inset -30px -20px 40px rgba(0,0,0,0.6),
        0 0 40px cyan;
}

@keyframes globeRotate {
    0% { background-position: 0 0; }
    100% { background-position: 1000px 0; }
}

/* ✍️ NAME */
.name {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    font-size: 20px;
    font-weight: bold;

    text-shadow: 
        0 0 5px black,
        0 0 10px cyan,
        0 0 20px cyan;
}

/* LIGHT EFFECT */
.globe::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3), transparent);
}

/* HEADER */
.header {
    font-size: 30px;
}

/* 📊 SPEED BOX */
.speed-box {
    width: 90%;
    max-width: 600px;
    margin: 20px auto;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

.speed-box iframe {
    width: 100%;
    height: 350px;
    border: none;
}

/* BUTTON */
.btn {
    margin-top: 15px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: cyan;
    cursor: pointer;
    font-weight: bold;
}

.footer {
    margin-top: 30px;
    font-size: 12px;
    opacity: 0.6;
}
</style>
</head>

<body>

<!-- 🔝 TOP BAR -->
<div class="top-bar">
    <div class="left-info">
        🌡️ <span id="temp">Loading...</span>
    </div>
    <div class="right-info">
        🕒 <span id="datetime"></span>
    </div>
</div>

<div class="header">🚀 Deepak Dabi Speed Test</div>

<!-- 🌍 EARTH -->
<div class="globe">
    <div class="name">Deepak Dabi</div>
</div>

<p>📞 9521393991</p>

<!-- 📊 SPEED TEST -->
<div class="speed-box">
    <iframe id="testFrame" src="https://fast.com"></iframe>
</div>

<button class="btn" onclick="reloadTest()">🔄 Restart Test</button>

<div class="footer">
© 2026 Deepak Dabi
</div>

<script>
// 🔄 Reload Speed Test
function reloadTest() {
    document.getElementById("testFrame").src = "https://fast.com";
}

// 🕒 Live Time
function updateTime() {
    let now = new Date();
    let date = now.toLocaleDateString();
    let time = now.toLocaleTimeString();
    document.getElementById("datetime").innerText = date + " | " + time;
}
setInterval(updateTime, 1000);
updateTime();

// 🌡️ Temperature (GPS)
navigator.geolocation.getCurrentPosition(position => {
    let lat = position.coords.latitude;
    let lon = position.coords.longitude;

    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
    .then(res => res.json())
    .then(data => {
        let temp = data.current_weather.temperature;
        document.getElementById("temp").innerText = temp + "°C";
    })
    .catch(() => {
        document.getElementById("temp").innerText = "N/A";
    });
});
</script>

</body>
</html>
