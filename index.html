<script>

const API_KEY = "YOUR_API_KEY_HERE"; // ⚠️ never public use
const CHANNEL_ID = "UCz8pPrV3SmCKRUem0R1JvOw";

let videos = [];
let i = 0;
let interval;

/* LOAD LATEST VIDEOS (SAFE VERSION) */
async function loadLatest() {
try {
let url = `https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=5`;

let res = await fetch(url);
let data = await res.json();

/* SAFE FILTER */
videos = data.items
.filter(item => item.id && item.id.videoId)
.map(item => item.id.videoId);

/* CHECK EMPTY */
if (videos.length === 0) {
alert("No videos found");
return;
}

play(videos[0]);

} catch (err) {
console.log(err);
alert("API Error - check key or quota");
}
}

/* PLAY */
function play(id) {
document.getElementById("player").src =
"https://www.youtube.com/embed/" + id + "?autoplay=1";
}

/* AUTO MODE */
function autoMode() {
stop();

interval = setInterval(() => {
i++;
if (i >= videos.length) i = 0;
play(videos[i]);
}, 5000);
}

/* STOP */
function stop() {
clearInterval(interval);
}

/* SUBSCRIBER COUNT */
async function getSubs() {
try {
let url = `https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${CHANNEL_ID}&key=${API_KEY}`;

let res = await fetch(url);
let data = await res.json();

if (!data.items || data.items.length === 0) {
document.getElementById("subs").innerText = "Channel not found";
return;
}

let subs = data.items[0].statistics.subscriberCount;

document.getElementById("subs").innerText =
Number(subs).toLocaleString() + " Subscribers";

} catch (e) {
document.getElementById("subs").innerText = "API Error";
}
}

/* AI TIPS */
let tips = [
"Upload 2 Shorts Daily",
"Use Trending Topics",
"Make Series Content",
"Improve Thumbnails",
"Go Live Weekly"
];

function ai() {
let r = Math.floor(Math.random() * tips.length);
document.getElementById("ai").innerText = tips[r];
}

/* INIT */
getSubs();
loadLatest();

</script>
