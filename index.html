<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DD ULTRA GLOBAL SPEED TEST</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#05070c,#000);
color:white;
text-align:center;
}

h1{
color:#00f5ff;
margin:15px;
}

.card{
background:rgba(255,255,255,0.06);
margin:15px;
padding:15px;
border-radius:15px;
backdrop-filter:blur(10px);
}

.circle{
width:200px;
height:200px;
border-radius:50%;
border:6px solid #00f5ff;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.speed{
font-size:32px;
color:#00f5ff;
font-weight:bold;
}

button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#00f5ff;
color:black;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin:15px;
}

.box{
background:#111;
padding:10px;
border-radius:10px;
}

input{
padding:10px;
border-radius:10px;
border:none;
margin:5px;
width:40%;
}

@media(max-width:700px){
.grid{grid-template-columns:1fr;}
input{width:80%;}
}
</style>
</head>

<body>

<h1>DD ULTRA GLOBAL 🌍</h1>

<div class="card">

<input id="name" placeholder="Enter Name">
<input id="country" placeholder="Country (IN, US)">

<br>

<div class="circle">
<div class="speed" id="speed">0</div>
<div>Mbps</div>
</div>

<button onclick="startTest()">START TEST</button>

<div class="grid">
<div class="box">Download <h3 id="down">0</h3></div>
<div class="box">Upload <h3 id="up">0</h3></div>
<div class="box">Ping <h3 id="ping">0</h3></div>
<div class="box">Score <h3 id="score">0</h3></div>
</div>

<canvas id="chart"></canvas>

</div>

<script>

const WEB_APP_URL = "PASTE_YOUR_GOOGLE_SCRIPT_URL_HERE";

let chart;

function initChart(){
const ctx=document.getElementById("chart");
chart=new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[{
label:"Speed (Mbps)",
data:[],
borderColor:"#00f5ff",
tension:0.4
}]
},
options:{responsive:true}
});
}
initChart();

function updateChart(v){
if(chart.data.labels.length>25){
chart.data.labels.shift();
chart.data.datasets[0].data.shift();
}
chart.data.labels.push("");
chart.data.datasets[0].data.push(v);
chart.update();
}

function startTest(){

let name=document.getElementById("name").value || "User";
let country=document.getElementById("country").value || "IN";

let speed=0;
let down=0;
let up=0;
let ping=Math.floor(Math.random()*70)+10;

document.getElementById("ping").innerText=ping+" ms";

let i=setInterval(()=>{

speed += Math.random()*15;
down += Math.random()*10;
up += Math.random()*7;

if(speed>120){
clearInterval(i);

let score=(down+up)-(ping/10);
document.getElementById("score").innerText=score.toFixed(2);

// SEND TO GOOGLE SHEETS
fetch(WEB_APP_URL+
"?name="+name+
"&down="+down.toFixed(1)+
"&up="+up.toFixed(1)+
"&ping="+ping+
"&country="+country);

}

document.getElementById("speed").innerText=speed.toFixed(1);
document.getElementById("down").innerText=down.toFixed(1)+" Mbps";
document.getElementById("up").innerText=up.toFixed(1)+" Mbps";

updateChart(speed);

},200);

}

</script>

</body>
</html>
