<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deepak Ultra CRM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top,#020617,#000);
color:white;
}

/* HEADER */
.header{
padding:15px;
font-size:20px;
font-weight:bold;
text-align:center;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

/* GRID */
.container{
display:grid;
grid-template-columns:1fr;
gap:12px;
padding:10px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border-radius:18px;
padding:15px;
backdrop-filter:blur(12px);
box-shadow:0 0 25px rgba(0,255,255,0.15);
}

/* INPUT */
input,select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:none;
background:#020617;
color:white;
outline:none;
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
font-weight:bold;
background:linear-gradient(45deg,#00f5ff,#00ff9d);
color:black;
margin-top:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px #00f5ff;
}

/* FLOAT BUTTON */
.fab{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:linear-gradient(45deg,#00f5ff,#00ff9d);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
color:black;
cursor:pointer;
box-shadow:0 0 20px #00f5ff;
}

/* LIST */
.item{
background:#020617;
padding:12px;
margin:8px 0;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.actions button{
width:auto;
padding:6px 10px;
margin-left:5px;
font-size:12px;
}

/* DASHBOARD */
.dashboard{
display:flex;
justify-content:space-between;
}

.stat{
flex:1;
margin:5px;
padding:10px;
border-radius:12px;
background:#020617;
text-align:center;
}

/* SEARCH */
.search{
margin-bottom:10px;
}

/* RESPONSIVE */
@media(min-width:768px){
.container{
grid-template-columns:1fr 1fr;
}
}
</style>
</head>

<body>

<div class="header">🚀 Deepak Ultra CRM</div>

<div class="container">

<div class="card">

<select id="prefix">
<option>Mr.</option>
<option>Mrs.</option>
<option>Ms.</option>
</select>

<select id="template">
<option value="recovery">Recovery</option>
<option value="workshop">Workshop Invite</option>
</select>

<input id="number" placeholder="Mobile Number" oninput="autoFill(); autoSave()">
<input id="name" placeholder="Customer Name" oninput="autoSave()">

<button onclick="send()">📩 Send WhatsApp</button>

<input type="file" onchange="importData(event)">

</div>

<div class="card dashboard">
<div class="stat">
<h2 id="total">0</h2>
<p>Total Customers</p>
</div>
</div>

</div>

<div class="card">
<input class="search" id="search" placeholder="🔍 Search..." oninput="load()">
<div id="list"></div>
</div>

<div class="fab" onclick="scrollToTop()">⬆</div>

<script>

/* ELEMENTS */
let number=document.getElementById("number");
let nameField=document.getElementById("name");

/* AUTO SAVE */
function autoSave(){
let num=number.value;
let name=nameField.value;

if(num.length===10 && name){
let data=JSON.parse(localStorage.getItem("crm")||"{}");
data[num]=name;
localStorage.setItem("crm",JSON.stringify(data));
update(); load();
}
}

/* AUTO FILL */
function autoFill(){
let data=JSON.parse(localStorage.getItem("crm")||"{}");
if(data[number.value]){
nameField.value=data[number.value];
}
}

/* DELETE */
function deleteCustomer(num){
let data=JSON.parse(localStorage.getItem("crm")||"{}");
delete data[num];
localStorage.setItem("crm",JSON.stringify(data));
load(); update();
}

/* SEND */
function send(){
let num=number.value;
let name=nameField.value || "Customer";
let prefix=document.getElementById("prefix").value;
let template=document.getElementById("template").value;

if(!/^[0-9]{10}$/.test(num)){
alert("Invalid number");
return;
}

let msg="";

/* RECOVERY MESSAGE */
if(template==="recovery"){
msg=`Dear ${prefix} ${name} Ji,

मैं Deepak Dabi, Airtel AirFiber Recovery Advisor बोल रहा हूँ।
आपका Airtel AirFiber Box (Router & Adapter) recovery हेतु collect करना है।

कृपया device ready रखें 🙏
Kindly share your current location for smooth coordination.

Device return न करने की स्थिति में Airtel द्वारा penalty charges लग सकते हैं।

धन्यवाद,
Deepak Dabi
📞 9521393991`;
}

/* WORKSHOP MESSAGE */
else{
msg=`नमस्कार ${prefix} ${name} जी 🙏

आपके पिछले वर्कशॉप अनुभव के बारे में हमें जानकारी मिली और हमें खेद है कि आपका अनुभव संतोषजनक नहीं रहा।

हम आपको पुनः हमारे वर्कशॉप में आमंत्रित करते हैं ताकि इस बार बेहतर सेवा दे सकें।

📍 Shri Ram Motors
123, Bhagat Ki Kothi Vistar Yojna, Main Pali Road
Jodhpur, RJ – 342001

📞 9521393991

धन्यवाद 🙏
Shri Ram Motors Team`;
}

window.open("https://wa.me/91"+num+"?text="+encodeURIComponent(msg));
}

/* LOAD */
function load(){
let data=JSON.parse(localStorage.getItem("crm")||"{}");
let search=document.getElementById("search").value.toLowerCase();
let html="";

for(let num in data){
if(data[num].toLowerCase().includes(search) || num.includes(search)){
html+=`
<div class="item">
<div><b>${data[num]}</b><br>${num}</div>
<div class="actions">
<button onclick="quickSend('${num}')">Send</button>
<button onclick="deleteCustomer('${num}')">❌</button>
</div>
</div>`;
}
}
document.getElementById("list").innerHTML=html;
}

/* QUICK SEND */
function quickSend(num){
number.value=num;
autoFill();
send();
}

/* UPDATE */
function update(){
let data=JSON.parse(localStorage.getItem("crm")||"{}");
document.getElementById("total").innerText=Object.keys(data).length;
}

/* IMPORT */
function importData(e){
let reader=new FileReader();
reader.onload=function(ev){
localStorage.setItem("crm",ev.target.result);
load(); update();
};
reader.readAsText(e.target.files[0]);
}

/* SCROLL TOP */
function scrollToTop(){
window.scrollTo({top:0,behavior:"smooth"});
}

/* INIT */
update(); load();

</script>

</body>
</html>
