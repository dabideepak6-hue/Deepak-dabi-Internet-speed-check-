<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deepak Dabi Speed Test</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: white;
    text-align: center;
}

/* 🌍 EARTH NAME CONTAINER */
.earth-name-container {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

/* 🌍 EARTH */
.earth-3d {
    position: relative;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: url('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg') no-repeat center;
    background-size: cover;
    animation: rotateEarth 25s linear infinite;
    box-shadow: 
        inset -20px -20px 40px rgba(0,0,0,0.5),
        0 0 40px rgba(0,255,255,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

@keyframes rotateEarth {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* ✍️ NAME 3D */
.name-3d {
    position: absolute;
    color: white;
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    z-index: 2;
    text-shadow:
        0 0 5px black,
        0 0 10px #00ffff,
        0 0 20px #00ffff,
        2px 2px 6px black;
    transform: rotateX(15deg);
}

/* ✨ GLASS EFFECT */
.earth-3d::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), transparent);
}

/* UI */
.header {
    padding: 25px;
    font-size: 34px;
    font-weight: 700;
}

.sub {
    font-size: 14px;
    opacity: 0.7;
}

.card {
    background: rgba(255,255,255,0.08);
    margin: 20px auto;
    padding: 25px;
    border-radius: 20px;
    max-width: 900px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

.btn {
    margin-top: 15px;
    padding: 12px 22px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(45deg,#00c6ff,#00ffcc);
    color: black;
    font-weight: bold;
    cursor: pointer;
}
.btn:hover {
    transform: scale(1.05);
}

.footer {
    margin-top: 30px;
    font-size: 13px;
    opacity: 0.6;
}
</style>
</head>

<body>

<div class="header">🚀 Deepak Dabi Speed Test</div>
<div class="sub">Check your internet speed instantly ⚡</div>

<!-- 🌍 EARTH WITH NAME -->
<div class="earth-name-container">
    <div class="earth-3d">
        <div class="name-3d">Deepak Dabi</div>
    </div>
</div>

<p>📞 9521393991</p>

<!-- SPEED TEST -->
<div class="card">
    <h2>📶 Live Internet Speed Test</h2>

    <iframe id="testFrame" src="https://fast.com" width="100%" height="420"></iframe>

    <button class="btn" onclick="reloadTest()">🔄 Restart Test</button>
    <br>
    <button class="btn" onclick="shareWhatsApp()">📲 Share on WhatsApp</button>
</div>

<!-- TIPS -->
<div class="card">
    <h3>💡 Tips for Better Speed</h3>
    <p>✔ Keep router near you</p>
    <p>✔ Use 5GHz WiFi</p>
    <p>✔ Close background apps</p>
</div>

<div class="footer">
    © 2026 Deepak Dabi | Made for Viral Sharing 🔥
</div>

<script>
function reloadTest() {
    document.getElementById("testFrame").src = "https://fast.com";
}

function shareWhatsApp() {
    let text = "🔥 Check your internet speed now!\n🚀 Try here: " + window.location.href;
    window.open("https://wa.me/?text=" + encodeURIComponent(text));
}
</script>

</body>
</html>
