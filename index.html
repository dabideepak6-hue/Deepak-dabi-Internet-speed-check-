<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DD Auto YouTube TV</title>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#00c6ff;
margin:10px;
}

.container{
max-width:1000px;
margin:auto;
padding:10px;
}

.card{
background:#111;
padding:12px;
border-radius:12px;
margin:10px 0;
}

iframe{
width:100%;
height:420px;
border:none;
border-radius:12px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:10px;
background:#00c6ff;
color:black;
font-weight:bold;
cursor:pointer;
}

.big{
font-size:22px;
color:#00c6ff;
font-weight:bold;
}

.ticker{
background:#111;
padding:8px;
border-top:2px solid #00c6ff;
border-bottom:2px solid #00c6ff;
overflow:hidden;
}

.ticker span{
display:inline-block;
white-space:nowrap;
animation:scroll 10s linear infinite;
color:#00f5ff;
font-weight:bold;
}

@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}
</style>
</head>

<body>

<h1>📺 DD AUTO YOUTUBE TV DASHBOARD</h1>

<div class="ticker">
<span id="news">AUTO MODE ACTIVE • NO API REQUIRED • STABLE SYSTEM • YOUTUBE EMBED MODE RUNNING • DD TV ONLINE...</span>
</div>

<div class="container">

<!-- PLAYER -->
<div class="card">

<iframe id="player"
src="https://www.youtube.com/embed/Dd5oJug8R38?autoplay=1"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>

<div>
<button onclick="startAuto()">🔁 AUTO PLAY</button>
<button onclick="stopAuto()">⛔ STOP</button>
</div>

</div>

<!-- INFO -->
<div class="card">

<h3>📊 STATUS</h3>
<div class="big" id="status">Ready</div>

</div>

</div>

<script>

/* 🎬 YOUR VIDEO LIST (ADD YOUR VIDEOS HERE) */
let videos = [
"Dd5oJug8R38",
"dQw4w9WgXcQ",
"3JZ_D3ELwOQ",
"kJQP7kiw5Fk"
];

let i = 0;
let interval;

/* PLAY VIDEO */
function play(id){
document.getElementById("player").src =
"https://www.youtube.com/embed/" + id + "?autoplay=1";
}

/* AUTO MODE */
function startAuto(){

document.getElementById("status").innerText = "AUTO MODE RUNNING";

interval = setInterval(() => {
i++;
if(i >= videos.length) i = 0;
play(videos[i]);
}, 5000);

}

/* STOP */
function stopAuto(){
clearInterval(interval);
document.getElementById("status").innerText = "STOPPED";
}

/* NEWS LOOP */
let news = [
"DD AUTO TV ACTIVE",
"NO API REQUIRED SYSTEM",
"STABLE VIDEO ENGINE",
"AUTO SWITCH ENABLED"
];

let n = 0;

setInterval(()=>{
document.getElementById("news").innerText = news[n];
n = (n + 1) % news.length;
},4000);

</script>

</body>
</html>
