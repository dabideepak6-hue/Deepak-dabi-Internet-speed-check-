<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deepak Dabi - Airtel Fiber Jodhpur</title>

<!-- MAP -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

/* BACKGROUND LOGO WALLPAPER */
body {
    margin:0;
    font-family: 'Trebuchet MS', sans-serif;
    color:white;
    text-align:center;

    background: url('deepak-logo-bg.png') no-repeat center center fixed;
    background-size: cover;
}

/* DARK OVERLAY */
body::before {
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.65);
    z-index:-1;
}

/* TOP BAR */
.top-bar{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:rgba(0,0,0,0.7);
    font-weight:bold;
}

/* BOX */
.box{
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    padding:18px;
    margin:15px auto;
    width:90%;
    max-width:420px;
    border-radius:15px;
    border:2px solid gold;
    box-shadow:0 0 20px rgba(255,215,0,0.7);
}

/* INPUT */
input{
    width:90%;
    padding:10px;
    border-radius:10px;
    border:none;
    background:#fff3e0;
    color:black;
    font-weight:bold;
}

/* BUTTON */
button{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    margin-top:10px;
    cursor:pointer;
    background: linear-gradient(45deg,#FFD700,#FFA500);
    color:black;
    font-weight:bold;
    box-shadow:0 0 10px gold;
}

/* TITLE */
h2, h3{
    color:#FFD700;
    text-shadow:0 0 15px gold;
}

/* MAP */
#map{
    height:300px;
    width:90%;
    margin:20px auto;
    border-radius:15px;
    border:3px solid gold;
}

</style>
</head>

<body>

<div class="top-bar">
🌡️ <span id="temp">Loading...</span>
🕒 <span id="time"></span>
</div>

<h2 style="margin-top:60px;">👑 Marwar Fast WiFi - Jodhpur</h2>
<p style="color:gold;">🔥 1000+ Happy Customers</p>

<!-- SPEED -->
<div class="box">
<iframe src="https://fast.com" style="width:100%; height:250px; border:none;"></iframe>
</div>

<!-- PLAN -->
<div class="box">
<h3>🔥 Airtel Fiber ₹499 Plan</h3>
<p>⚡ 40 Mbps Speed</p>
<p>📶 Unlimited Data</p>
<button onclick="orderNow()">🚀 Book Now</button>
</div>

<!-- FORM -->
<div class="box">
<h3>📡 New Connection</h3>

<input id="name" placeholder="Name"><br><br>
<input id="mobile" placeholder="Mobile (+91 or 10 digit)"><br><br>
<input id="city" placeholder="City"><br><br>

<button onclick="getLocation()">📍 Use My Location</button>
<p id="locationText"></p>

<button onclick="submitLead()">Submit</button>
</div>

<!-- FEASIBILITY -->
<div id="feasibilityBox"></div>

<!-- MAP -->
<div id="map"></div>

<script>

// TIME
setInterval(()=>{
document.getElementById("time").innerText = new Date().toLocaleTimeString();
},1000);

// WEATHER
navigator.geolocation.getCurrentPosition(pos=>{
fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true`)
.then(res=>res.json())
.then(data=>{
document.getElementById("temp").innerText = data.current_weather.temperature+"°C";
});
});

// MAP
let map;
function loadMap(lat, lon){
if(map){ map.remove(); }
map = L.map('map').setView([lat, lon], 15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
L.marker([lat, lon]).addTo(map).bindPopup("📍 Your Location").openPopup();
}

// LOCATION
function getLocation(){
navigator.geolocation.getCurrentPosition(async (pos)=>{

let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

loadMap(lat, lon);

let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
let data = await res.json();

let city = data.address.city || data.address.town || data.address.village || "";

document.getElementById("city").value = city;
document.getElementById("locationText").innerText = "📍 " + city;

checkFeasibility(city);

});
}

// FEASIBILITY
function checkFeasibility(city){
let cities = ["Jodhpur","Jaipur","Udaipur","Kota","Ajmer","Bikaner"];
let box = document.getElementById("feasibilityBox");

if(cities.includes(city)){
box.innerHTML = "✅ Airtel Fiber Available in " + city;
box.style.color="lightgreen";
}else{
box.innerHTML = "⚠️ Checking availability...";
box.style.color="orange";
}
}

// MOBILE FORMAT
function formatMobile(mobile){
mobile = mobile.replace(/\D/g,'');
if(mobile.startsWith("91") && mobile.length===12){
mobile = mobile.substring(2);
}
return mobile;
}

// SUBMIT
function submitLead(){

let name = document.getElementById("name").value;
let mobile = document.getElementById("mobile").value;
let city = document.getElementById("city").value;

if(name=="" || mobile==""){
alert("Fill details");
return;
}

mobile = formatMobile(mobile);

if(!/^[6-9]\d{9}$/.test(mobile)){
alert("Enter valid mobile number");
return;
}

navigator.geolocation.getCurrentPosition(pos=>{

let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

let msg = `New Lead:%0AName: ${name}%0AMobile: ${mobile}%0ACity: ${city}%0ALocation: https://maps.google.com/?q=${lat},${lon}`;

window.open(`https://wa.me/919521393991?text=${msg}`);

});

alert("Submitted Successfully!");
}

// ORDER BUTTON
function orderNow(){
window.open("https://wa.me/919521393991?text=Hi I want Airtel Fiber");
}

</script>

</body>
</html>
