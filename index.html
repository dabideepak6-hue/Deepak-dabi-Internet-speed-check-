<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deepak Dabi Speed Test</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

/* 🔝 TOP BAR */
.top-bar {
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:8px 15px;
    background:rgba(0,0,0,0.5);
    z-index:999;
}

.left-info {color:#00ffff;}
.right-info {color:#fff;}

/* 🌦️ WEATHER ICON */
.weather-icon {
    font-size:18px;
    margin-left:5px;
}

/* 🌍 GLOBE */
.globe {
    width:200px;
    height:200px;
    margin:70px auto 20px;
    border-radius:50%;
    overflow:hidden;
    background:url('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg') repeat-x;
    background-size:cover;
    animation:rotate 20s linear infinite;
}

@keyframes rotate {
    from{background-position:0 0;}
    to{background-position:1000px 0;}
}

.name {
    position:absolute;
    top:150px;
    left:50%;
    transform:translateX(-50%);
    font-weight:bold;
    text-shadow:0 0 10px cyan;
}

/* 📊 SPEED BOX */
.speed-box {
    width:90%;
    max-width:600px;
    margin:20px auto;
}

iframe {
    width:100%;
    height:300px;
    border:none;
    border-radius:15px;
}

/* 📍 MAP */
.map-box {
    width:90%;
    max-width:600px;
    margin:20px auto;
    border-radius:15px;
    overflow:hidden;
}

/* 📶 SIGNAL */
.signal {
    margin:20px;
}

.bar {
    display:inline-block;
    width:8px;
    height:20px;
    margin:2px;
    background:cyan;
    animation:signal 1s infinite;
}

.bar:nth-child(2){animation-delay:0.2s;}
.bar:nth-child(3){animation-delay:0.4s;}
.bar:nth-child(4){animation-delay:0.6s;}

@keyframes signal {
    0%{height:10px;}
    50%{height:30px;}
    100%{height:10px;}
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <div class="left-info">
        🌡️ <span id="temp">Loading...</span>
        <span class="weather-icon" id="icon"></span>
    </div>
    <div class="right-info">
        🕒 <span id="time"></span>
    </div>
</div>

<h2 style="margin-top:60px;">🚀 Deepak Dabi Speed Test</h2>

<!-- 🌍 -->
<div class="globe"></div>
<div class="name">Deepak Dabi</div>

<p>📞 9521393991</p>

<!-- 📊 SPEED -->
<div class="speed-box">
    <iframe src="https://fast.com"></iframe>
</div>

<!-- 📶 SIGNAL -->
<div class="signal">
    📶 Network Signal<br>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
</div>

<!-- 📍 MAP -->
<div class="map-box">
    <iframe id="map" src=""></iframe>
</div>

<script>
// 🕒 TIME
setInterval(()=>{
    document.getElementById("time").innerText = new Date().toLocaleString();
},1000);

// 🌡️ TEMP + ICON + MAP
navigator.geolocation.getCurrentPosition(pos=>{
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    // WEATHER
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
    .then(res=>res.json())
    .then(data=>{
        let t = data.current_weather.temperature;
        document.getElementById("temp").innerText = t + "°C";

        let code = data.current_weather.weathercode;

        // ICON
        let icon = "☀️";
        if(code>2) icon="☁️";
        if(code>60) icon="🌧️";

        document.getElementById("icon").innerText = icon;
    });

    // 📍 MAP
    document.getElementById("map").src =
    `https://maps.google.com/maps?q=${lat},${lon}&z=15&output=embed`;

});
</script>

</body>
</html>
