<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deepak Dabi Recovery CRM</title>

<style>
body{
margin:0;
background:#0b0f1a;
color:white;
font-family:Arial;
text-align:center;
}

h2{
color:#00f5ff;
margin-top:15px;
}

.card{
background:rgba(255,255,255,0.05);
margin:15px;
padding:15px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,255,255,0.2);
}

input{
width:90%;
padding:12px;
margin:8px;
border:none;
border-radius:10px;
outline:none;
}

button{
width:92%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,green,lightgreen);
font-weight:bold;
cursor:pointer;
}

.preview{
background:#001f2f;
padding:10px;
margin-top:10px;
border-radius:10px;
white-space:pre-line;
text-align:left;
font-size:13px;
}
</style>
</head>

<body>

<h2>🚀 Recovery CRM System</h2>

<div class="card">

<input id="name" placeholder="Customer Name" oninput="updatePreview()">
<input id="number" placeholder="Mobile Number">

<button onclick="sendMsg()">📲 Send WhatsApp</button>

<div class="preview" id="preview"></div>

</div>

<script>

/* SAFE MESSAGE GENERATOR */
function getMessage(name){

if(!name || name.trim()===""){
name="Customer";
}

let prefix = (name.toLowerCase().endsWith("a") || name.toLowerCase().endsWith("i"))
? "Mrs."
: "Mr.";

return `Dear ${prefix} ${name} Ji,

मैं Deepak Dabi, Airtel AirFiber Recovery Advisor बोल रहा हूँ।
आपका Airtel AirFiber Box (Router & Adapter) recovery हेतु collect करना है।

कृपया device ready रखें 🙏
Kindly share your current location for smooth coordination.

Device return न करने की स्थिति में Airtel द्वारा penalty charges लग सकते हैं।

धन्यवाद,
Deepak Dabi
📞 9521393991
Airtel AirFiber Recovery Advisor`;
}

/* PREVIEW */
function updatePreview(){
let name=document.getElementById("name").value;
document.getElementById("preview").innerText=getMessage(name);
}
updatePreview();

/* SEND WHATSAPP */
function sendMsg(){

let name=document.getElementById("name").value;
let number=document.getElementById("number").value;

if(!name || name.trim()===""){
name="Customer";
}

if(!number){
alert("Please enter number");
return;
}

if(!number.startsWith("91")){
number="91"+number;
}

let message = getMessage(name);

let url = "https://api.whatsapp.com/send?phone="
+ number
+ "&text="
+ encodeURIComponent(message);

window.open(url,"_blank");
}

</script>

</body>
</html>
