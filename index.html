<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DD Clock + Message</title>

<style>
body{
margin:0;
background:linear-gradient(135deg,#0b0f14,#111);
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

/* CLOCK */
.clock{
width:260px;
height:260px;
border-radius:50%;
margin:20px auto;
position:relative;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border:4px solid rgba(255,255,255,0.1);
box-shadow:0 0 30px rgba(0,198,255,0.3);
}

/* NUMBERS */
.number{
position:absolute;
color:#00c6ff;
font-weight:bold;
font-size:18px;
transform:translate(-50%,-50%);
}

/* HANDS */
.hand{
position:absolute;
top:50%;
left:50%;
transform-origin:0% 50%;
transform:rotate(90deg);
}

.hour{
width:70px;
height:5px;
background:white;
}

.minute{
width:90px;
height:3px;
background:#00c6ff;
}

.second{
width:100px;
height:2px;
background:red;
}

.center{
width:12px;
height:12px;
background:#00c6ff;
border-radius:50%;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

/* DATE */
.date{
font-size:18px;
color:#00c6ff;
margin-top:10px;
}

/* CARD */
.card{
background:#111;
padding:20px;
border-radius:15px;
max-width:400px;
margin:20px auto;
}

/* INPUT */
input{
padding:10px;
margin:10px;
width:90%;
border-radius:10px;
border:none;
font-size:16px;
}

/* BUTTON */
button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#00c6ff;
color:black;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<h2>📲 DD Live Clock + Message</h2>

<!-- CLOCK -->
<div class="clock">

<div class="number" style="top:5%; left:50%;">12</div>
<div class="number" style="top:15%; left:75%;">1</div>
<div class="number" style="top:35%; left:90%;">2</div>
<div class="number" style="top:50%; left:95%;">3</div>
<div class="number" style="top:65%; left:90%;">4</div>
<div class="number" style="top:85%; left:75%;">5</div>
<div class="number" style="top:95%; left:50%;">6</div>
<div class="number" style="top:85%; left:25%;">7</div>
<div class="number" style="top:65%; left:10%;">8</div>
<div class="number" style="top:50%; left:5%;">9</div>
<div class="number" style="top:35%; left:10%;">10</div>
<div class="number" style="top:15%; left:25%;">11</div>

<div class="hand hour" id="hour"></div>
<div class="hand minute" id="minute"></div>
<div class="hand second" id="second"></div>
<div class="center"></div>

</div>

<!-- DATE -->
<div class="date" id="date"></div>

<!-- MESSAGE -->
<div class="card">

<input type="text" id="name" placeholder="Customer Name">
<input type="text" id="number" placeholder="Mobile Number (91XXXXXXXXXX)">

<button onclick="sendMsg()">Send Message</button>

</div>

<script>

/* CLOCK + DATE */
function updateClock(){

let now = new Date();

let sec = now.getSeconds();
let min = now.getMinutes();
let hr = now.getHours();

/* ROTATION */
let secDeg = sec * 6;
let minDeg = min * 6 + sec * 0.1;
let hrDeg = (hr % 12) * 30 + min * 0.5;

/* APPLY */
document.getElementById("second").style.transform =
`translate(-50%, -50%) rotate(${secDeg}deg)`;

document.getElementById("minute").style.transform =
`translate(-50%, -50%) rotate(${minDeg}deg)`;

document.getElementById("hour").style.transform =
`translate(-50%, -50%) rotate(${hrDeg}deg)`;

/* DATE */
let options = { day:'numeric', month:'long', year:'numeric' };
document.getElementById("date").innerText =
now.toLocaleDateString("en-IN", options);

}

/* IMPORTANT FIX */
updateClock(); // first run तुरंत
setInterval(updateClock,1000);

/* MESSAGE */
function sendMsg(){

let name = document.getElementById("name").value;
let number = document.getElementById("number").value;

let message = `Dear Mr. ${name} Ji,

मैं Deepak Dabi, Airtel AirFiber Recovery Advisor बोल रहा हूँ।
आपका Airtel AirFiber device collect करना है।

कृपया device ready रखें 🙏
और location share करें।

Device return न करने पर penalty लग सकती है।

धन्यवाद,
Deepak Dabi
9521393991`;

let url = "https://wa.me/" + number + "?text=" + encodeURIComponent(message);

window.open(url, "_blank");

}

</script>

</body>
</html>
