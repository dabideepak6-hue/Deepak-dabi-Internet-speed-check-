<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DD NEWS TV MODE</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:white;
text-align:center;
}

h1{
color:#00c6ff;
margin:10px;
}

/* NEWS TICKER */
.ticker{
background:#111;
padding:8px;
overflow:hidden;
border-top:2px solid #00c6ff;
border-bottom:2px solid #00c6ff;
}

.ticker span{
display:inline-block;
white-space:nowrap;
animation:scroll 12s linear infinite;
color:#00f5ff;
font-weight:bold;
}

@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* LAYOUT */
.container{
display:grid;
grid-template-columns:2fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:#111;
padding:10px;
border-radius:10px;
}

input,button{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
}

button{
background:#00c6ff;
color:black;
font-weight:bold;
cursor:pointer;
}

.circle{
width:180px;
height:180px;
border-radius:50%;
border:5px solid #00c6ff;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.speed{
font-size:26px;
color:#00c6ff;
font-weight:bold;
}

.livebox{
background:#000;
padding:10px;
border-radius:10px;
}

iframe{
width:100%;
height:220px;
border:none;
border-radius:10px;
}

@media(max-width:900px){
.container{grid-template-columns:1fr;}
}
</style>
</head>

</div>

</div>
