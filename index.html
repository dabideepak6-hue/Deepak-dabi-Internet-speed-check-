<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DD Final System</title>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Arial;
text-align:center;
}

.card{
background:#111;
margin:15px;
padding:15px;
border-radius:10px;
}

input,select,button{
padding:10px;
margin:5px;
width:90%;
border:none;
border-radius:8px;
}

button{
background:orange;
color:black;
font-weight:bold;
}

/* PLAYER */
iframe{
width:100%;
height:220px;
border:none;
border-radius:10px;
}
</style>
</head>

<body>

<h2>🚀 DD Final Working System</h2>

<!-- MESSAGE -->
<div class="card">

<input id="name" placeholder="Enter Name" oninput="detectAI()">
<input id="number" placeholder="Mobile Number">

<div id="aiResult">AI: Waiting...</div>

<select id="manual">
<option value="auto">Auto</option>
<option value="Mr.">Mr.</option>
<option value="Mrs.">Mrs.</option>
</select>

<button onclick="sendMsg()">Send WhatsApp</button>

</div>

<!-- YOUTUBE PLAYER -->
<div class="card">

<h3>🎧 Rajasthani DJ Player</h3>

<iframe id="player"
src="https://www.youtube.com/embed/1sYd7H9hQn0?mute=1"
allow="autoplay"
allowfullscreen>
</iframe>

<br>

<button onclick="start()">▶ Start DJ</button>
<button onclick="next()">⏭ Next</button>

</div>

<script>

/* AI DETECT */
let detectedPrefix="Mr.";

function detectAI(){
let name=document.getElementById("name").value.toLowerCase();

if(!name){
document.getElementById("aiResult").innerText="AI: Waiting...";
return;
}

if(name.endsWith("a") || name.endsWith("i")){
detectedPrefix="Mrs.";
}else{
detectedPrefix="Mr.";
}

document.getElementById("aiResult").innerText="AI: "+detectedPrefix;
}

/* WHATSAPP FIX */
function sendMsg(){

let name=document.getElementById("name").value.trim();
let number=document.getElementById("number").value.trim();
let manual=document.getElementById("manual").value;

if(!number.startsWith("91")) number="91"+number;

let prefix = manual==="auto"?detectedPrefix:manual;

/* SAFE MESSAGE */
let msg=`Dear ${prefix} ${name} Ji,

मैं Deepak Dabi, Airtel AirFiber Recovery Advisor हूँ।

आपका Airtel AirFiber Box collect करना है।

कृपया device ready रखें और location share करें।

धन्यवाद,
Deepak Dabi
📞 9521393991`;

/* SAME TAB OPEN */
window.location.href=
`https://api.whatsapp.com/send?phone=${number}&text=${encodeURIComponent(msg)}`;
}

/* YOUTUBE PLAYLIST */
let videos=[
"1sYd7H9hQn0",
"9x9XG7z5r7U",
"3JZ_D3ELwOQ"
];

let i=0;

/* START */
function start(){
document.getElementById("player").src=
"https://www.youtube.com/embed/"+videos[i]+"?autoplay=1&mute=0";
}

/* NEXT */
function next(){
i=(i+1)%videos.length;

document.getElementById("player").src=
"https://www.youtube.com/embed/"+videos[i]+"?autoplay=1&mute=0";
}

</script>

</body>
</html>
