<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DD Premium Clock + Message</title>

<style>
body{
margin:0;
background:linear-gradient(135deg,#0b0f14,#111);
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

/* CLOCK */
.clock{
width:260px;
height:260px;
border-radius:50%;
margin:20px auto;
position:relative;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border:4px solid rgba(255,255,255,0.1);
box-shadow:0 0 30px rgba(0,198,255,0.3);
}

/* NUMBERS */
.number{
position:absolute;
color:#00c6ff;
font-weight:bold;
font-size:18px;
transform:translate(-50%,-50%);
}

/* HANDS */
.hand{
position:absolute;
top:50%;
left:50%;
transform-origin:0% 50%;
transform:rotate(90deg);
border-radius:10px;
}

.hour{
width:70px;
height:5px;
background:white;
}

.minute{
width:90px;
height:3px;
background:#00c6ff;
}

.second{
width:100px;
height:2px;
background:red;
}

.center{
width:12px;
height:12px;
background:#00c6ff;
border-radius:50%;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

/* CARD */
.card{
background:#111;
padding:20px;
border-radius:15px;
max-width:400px;
margin:20px auto;
}

/* INPUT */
input{
padding:10px;
margin:10px;
width:90%;
border-radius:10px;
border:none;
font-size:16px;
}

/* BUTTON */
button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#00c6ff;
color:black;
font-weight:bold;
cursor:pointer;
}
</style>
</head>
